<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>P2P Multi Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#f2f2f2;
padding:15px;
}

textarea{
width:100%;
height:90px;
margin-top:5px;
border-radius:8px;
padding:8px;
}

#chat{
height:220px;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#2196F3;
color:white;
margin-top:5px;
}

.row{
display:flex;
gap:5px;
}

.status{
background:white;
padding:8px;
border-radius:8px;
margin-bottom:10px;
text-align:center;
}

input{
width:70%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.send{
width:28%;
}
</style>
</head>

<body>

<h2>P2P Multi User Chat</h2>

<div class="status">
Peers connected: <b id="count">0</b>
</div>

<h3>Create Connection</h3>

<button onclick="createOffer()">Generate Offer</button>

<textarea id="myCode"></textarea>

<div class="row">
<button onclick="copyText('myCode')">Copy</button>
</div>

<h3>Connect Peer</h3>

<textarea id="partnerCode"></textarea>

<div class="row">
<button onclick="pasteText('partnerCode')">Paste</button>
<button onclick="connectPeer()">Connect</button>
</div>

<h3>Chat</h3>

<textarea id="chat" readonly></textarea>

<br><br>

<input id="msg" placeholder="message">
<button class="send" onclick="sendMsg()">Send</button>

<script>

let peers={}
let channels={}
let peerIndex=0

function createPeer(id){

let pc=new RTCPeerConnection({
iceServers:[{urls:"stun:stun.l.google.com:19302"}]
})

pc.ondatachannel=e=>{
channels[id]=e.channel
setupChannel(id)
}

return pc
}

function createOffer(){

let id="peer"+(++peerIndex)

let pc=createPeer(id)

let channel=pc.createDataChannel("chat")

channels[id]=channel

setupChannel(id)

pc.createOffer().then(o=>{
pc.setLocalDescription(o)
})

pc.onicecandidate=e=>{
if(!e.candidate){
myCode.value=JSON.stringify({
id:id,
sdp:pc.localDescription
})
peers[id]=pc
}
}

}

function connectPeer(){

let data=JSON.parse(partnerCode.value)

let id=data.id

let pc=createPeer(id)

pc.setRemoteDescription(data.sdp)

if(data.sdp.type==="offer"){

pc.createAnswer().then(a=>{
pc.setLocalDescription(a)
})

pc.onicecandidate=e=>{
if(!e.candidate){
myCode.value=JSON.stringify({
id:id,
sdp:pc.localDescription
})
}
}

}

peers[id]=pc

}

function setupChannel(id){

channels[id].onopen=()=>{
updateCount()
}

channels[id].onmessage=e=>{

chat.value+="Peer: "+e.data+"\n"

chat.scrollTop=chat.scrollHeight

}

}

function sendMsg(){

let text=msg.value

if(text==="")return

for(let id in channels){

if(channels[id].readyState==="open"){

channels[id].send(text)

}

}

chat.value+="Me: "+text+"\n"

msg.value=""

chat.scrollTop=chat.scrollHeight

}

function updateCount(){

let n=0

for(let id in channels){
if(channels[id].readyState==="open") n++
}

count.innerText=n

}

function copyText(id){

let text=document.getElementById(id)

text.select()

document.execCommand("copy")

}

async function pasteText(id){

let text=await navigator.clipboard.readText()

document.getElementById(id).value=text

}

</script>

</body>
</html>
