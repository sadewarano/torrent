<!DOCTYPE html>
<html>
<body>

<div id="hasil"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbwU3k3QpUNzeeyt9R4sOxKgyzvcjYKlj37hPR8035w7wRZHc-C_ZQr1Cu3k1pT4DBJqCg/exec";

function ambil(){
fetch(API)
.then(r=>r.json())
.then(d=>{
hasil.innerText = d.map(x => x.kode).join(", ");
});
}

ambil();
setInterval(ambil,3000);

</script>

</body>
</html>
