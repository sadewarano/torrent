<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>P2P Chat Mesh</title>
<style>
body{font-family:system-ui;background:#f0f2f5;padding:16px;max-width:600px;margin:auto}
.card{background:#fff;padding:16px;border-radius:12px;margin:10px 0;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
h2{margin:0 0 10px 0}
textarea{width:100%;height:80px;border:1px solid #ccc;border-radius:8px;padding:8px;box-sizing:border-box;font-family:monospace;font-size:0.85em}
input{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box}
.row{display:flex;gap:8px}
button{flex:1;padding:12px;border:none;border-radius:8px;background:#007bff;color:#fff;font-weight:600;margin:6px 0;cursor:pointer}
button.copy{background:#28a745}
button:disabled{background:#aaa}
#chatBox{height:250px;overflow-y:auto;border:1px solid #ddd;padding:10px;border-radius:8px;background:#fafafa}
.msg{padding:6px 10px;border-radius:8px;margin:4px 0;max-width:80%;word-wrap:break-word}
.me{background:#dcf8c6;margin-left:auto}
.peer{background:#fff;border:1px solid #eee}
.relay{font-size:0.8em;color:#888;background:#f8f9fa}
.status{font-size:0.9em;color:#666;text-align:center}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 16px;border-radius:20px;font-size:0.9em;display:none}
.peerList{font-size:0.8em;color:#555}
</style>
</head>
<body>

<h2>🌐 P2P Chat Mesh v2</h2>

<div class="card">
  <b class="status" id="status">Status: Belum Konek</b>
  <div class="peerList" id="peerList">ID Kamu: <b id="myId"></b> | Teman: 0</div>
</div>

<div class="card">
  <h3>Langkah 1: Buat Koneksi Baru</h3>
  <button id="btnOffer">1. Buat Offer Ke Teman Baru</button>
  <textarea id="localSDP" placeholder="Kode Offer/Answer muncul otomatis di sini" readonly></textarea>
  <div class="row">
    <button class="copy" onclick="copyCode('localSDP')">📋 Copy Kode</button>
  </div>
</div>

<div class="card">
  <h3>Langkah 2: Tempel Jawaban</h3>
  <textarea id="remoteSDP" placeholder="Tempel kode dari teman di sini"></textarea>
  <button id="btnAnswer">2. Set Remote & Konek</button>
</div>

<div class="card">
  <h3>Chat</h3>
  <div id="chatBox"></div>
  <input id="msgInput" placeholder="Ketik pesan...">
  <button id="btnSend" disabled>Kirim</button>
</div>

<div class="toast" id="toast">Tersalin!</div>

<script>
const status = document.getElementById("status");
const peerListEl = document.getElementById("peerList");
const myIdEl = document.getElementById("myId");
const localSDP = document.getElementById("localSDP");
const remoteSDP = document.getElementById("remoteSDP");
const chatBox = document.getElementById("chatBox");
const msgInput = document.getElementById("msgInput");
const btnSend = document.getElementById("btnSend");

const myId = "peer_" + Math.random().toString(36).substr(2, 5); // ID unik buat device ini
myIdEl.textContent = myId;

let peers = {}; // {peerId: {pc, dc, isActive}}
let pendingOffers = {}; // FIX 1: {offerId: peerId} buat mapping answer
let seenMessages = new Set(); // FIX 2: Anti loop

const config = {iceServers: [{ urls: "stun:stun.l.google.com:19302" }]};

function addMsg(text, who){
  const div = document.createElement("div");
  div.className = "msg " + who;
  div.textContent = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function updatePeerList(){
  const activeCount = Object.values(peers).filter(p=>p.isActive).length;
  peerListEl.innerHTML = `ID Kamu: <b>${myId}</b> | Teman: ${activeCount}`;
  status.textContent = activeCount > 0? `Status: Konek ke ${activeCount} teman ✅` : `Status: Belum Konek`;
  btnSend.disabled = activeCount === 0;
}

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  setTimeout(()=>t.style.display="none", 1500);
}
function copyCode(id){
  const el = document.getElementById(id); el.select();
  navigator.clipboard.writeText(el.value); toast("Tersalin!");
}

// FIX 2 & 3: BROADCAST DENGAN ID DAN FROM
function broadcast(payload, excludePeerId = null){
  if(seenMessages.has(payload.id)) return; // udah pernah liat, skip
  seenMessages.add(payload.id);

  for(let id in peers){
    if(id!== excludePeerId && peers[id].isActive){
      peers[id].dc.send(JSON.stringify(payload));
    }
  }
}

function setupDataChannel(dc, peerId){
  dc.onopen = () => {
    peers[peerId].isActive = true; // FIX 4: baru aktif kalau open
    addMsg(`Konek ke ${peerId} ✅`, "status");
    updatePeerList();
  };
  dc.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    
    if(seenMessages.has(msg.id)) return; // FIX 2: ANTI LOOP
    seenMessages.add(msg.id);

    // TAMPILKAN
    if(msg.from === myId){
      addMsg(`Kamu: ${msg.text}`, "me");
    }else{
      addMsg(`Dari ${msg.from}: ${msg.text}`, "peer");
      addMsg(`Relay dari ${msg.from}`, "relay");
    }

    // TERUSKAN
    broadcast(msg, peerId); // kirim ke semua kecuali yg ngirim
  };
  dc.onclose = () => {
    addMsg(`Putus dari ${peerId} ❌`, "status");
    peers[peerId].isActive = false;
    updatePeerList();
  };
}

document.getElementById("btnOffer").onclick = async () => {
  const newPeerId = "peer_" + Math.random().toString(36).substr(2, 5);
  const offerId = "offer_" + Date.now(); // FIX 5: ID buat offer ini
  
  peers[newPeerId] = {pc: new RTCPeerConnection(config), isActive: false};
  pendingOffers[offerId] = newPeerId; // FIX 1: Simpan mapping

  const peer = peers[newPeerId];
  peer.dc = peer.pc.createDataChannel("chat");
  setupDataChannel(peer.dc, newPeerId);

  peer.pc.onicecandidate = (e) => {
    if(peer.pc.localDescription){
      // FIX 5: KIRIM OFFER + OFFERID
      localSDP.value = JSON.stringify({
        type: "offer",
        offerId: offerId,
        from: myId,
        sdp: peer.pc.localDescription
      });
    }
  };

  const offer = await peer.pc.createOffer();
  await peer.pc.setLocalDescription(offer);
};

document.getElementById("btnAnswer").onclick = async () => {
  try{
    const signal = JSON.parse(remoteSDP.value);
    const remoteDesc = signal.sdp;

    if(signal.type === "offer"){
      const newPeerId = signal.from; // pakai ID pengirim sebagai ID peer
      if(peers[newPeerId]) return addMsg("Sudah konek ke peer ini", "status");

      peers[newPeerId] = {pc: new RTCPeerConnection(config), isActive: false};
      const peer = peers[newPeerId];

      peer.pc.ondatachannel = (e) => {
        peer.dc = e.channel;
        setupDataChannel(peer.dc, newPeerId);
      };
      peer.pc.onicecandidate = (e) => {
        if(peer.pc.localDescription){
          localSDP.value = JSON.stringify({
            type: "answer",
            offerId: signal.offerId, // FIX 1: Balas ke offerId yg sama
            from: myId,
            sdp: peer.pc.localDescription
          });
        }
      };

      await peer.pc.setRemoteDescription(remoteDesc);
      const answer = await peer.pc.createAnswer();
      await peer.pc.setLocalDescription(answer);
    }
    
    if(signal.type === "answer"){
      // FIX 1: CARI PEER BERDASARKAN OFFERID BUKAN LAST
      const peerId = pendingOffers[signal.offerId];
      if(!peerId) return addMsg("Offer ID tidak ditemukan", "status");
      
      await peers[peerId].pc.setRemoteDescription(remoteDesc);
      delete pendingOffers[signal.offerId]; // udah kepake
    }
  }catch(e){
    addMsg("Kode salah! Cek lagi: " + e.message, "status");
  }
  remoteSDP.value = "";
};

btnSend.onclick = () => {
  const text = msgInput.value;
  if(text){
    const payload = { // FIX 3: FORMAT PESAN BARU
      id: "msg_" + Date.now() + "_" + myId,
      from: myId,
      text: text
    };
    broadcast(payload); // kirim ke semua
    addMsg(`Kamu: ${text}`, "me");
    msgInput.value = "";
  }
};
msgInput.onkeypress = (e) => { if(e.key === "Enter") btnSend.onclick(); }

</script>
</body>
</html>
