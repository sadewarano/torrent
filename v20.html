<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>P2P Chat Ringkas</title>
<style>
body{font-family:system-ui;background:#f0f2f5;padding:16px;max-width:500px;margin:auto}
.card{background:#fff;padding:14px;border-radius:12px;margin:10px 0;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.status{text-align:center;color:#666;font-size:.9em}
textarea{width:100%;height:120px;border:1px solid #ccc;border-radius:8px;padding:8px;box-sizing:border-box;font-family:monospace;font-size:.8em}
.row{display:flex;gap:8px}
button{flex:1;padding:12px;border:none;border-radius:8px;background:#007bff;color:#fff;font-weight:600;cursor:pointer}
#btnProses{background:#28a745}
#chat{height:220px;overflow-y:auto;border:1px solid #ddd;padding:8px;border-radius:8px;background:#fafafa}
.msg{padding:6px 10px;border-radius:8px;margin:4px 0;max-width:80%;word-wrap:break-word}
.me{background:#dcf8c6;margin-left:auto}
.peer{background:#fff;border:1px solid #eee}
input{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 16px;border-radius:20px;font-size:.9em;display:none}
</style>
</head>
<body>

<h2>🌐 P2P Chat</h2>
<div class="card"><div class="status" id="status">Status: Belum konek</div></div>

<div class="card">
<b>Kode Offer / Answer</b>
<textarea id="code" placeholder="1. Klik Buat untuk hasilkan Offer
2. Tempel kode teman lalu klik Proses"></textarea>
<div class="row">
<button id="btnBuat">🟢 Buat</button>
<button id="btnProses">🔵 Proses</button>
</div>
</div>

<div class="card">
<b>Chat</b>
<div id="chat"></div>
<input id="msg" placeholder="Ketik pesan...">
<button id="btnKirim" disabled>Kirim</button>
</div>

<div class="toast" id="toast"></div>

<script>
const status = document.getElementById("status");
const code = document.getElementById("code");
const chat = document.getElementById("chat");
const msg = document.getElementById("msg");
const btnKirim = document.getElementById("btnKirim");

let pc, dc;
const config = {iceServers: [{urls: "stun:stun.l.google.com:19302"}]};

function add(t, cls){const d=document.createElement("div");d.className="msg "+cls;d.textContent=t;chat.appendChild(d);chat.scrollTop=chat.scrollHeight}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.style.display="block";setTimeout(()=>t.style.display="none",1500)}

function setDC(){
  dc.onopen=()=>{status.textContent="Status: Konek ✅";btnKirim.disabled=false;add("Konek P2P!","status")}
  dc.onmessage=e=>add(e.data,"peer")
  dc.onclose=()=>{status.textContent="Status: Putus ❌";btnKirim.disabled=true}
}

// 1. BUAT OFFER
btnBuat.onclick=async()=>{
  pc=new RTCPeerConnection(config);
  dc=pc.createDataChannel("chat");
  setDC();
  pc.onicecandidate=()=>{if(pc.localDescription)code.value=JSON.stringify(pc.localDescription)};
  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);
  code.select(); navigator.clipboard.writeText(code.value); // auto copy
  toast("Offer disalin");
  add("Kirim kode ini ke teman","status");
}

// 2. PROSES: OFFER JADI ANSWER, ANSWER JADI KONEK
btnProses.onclick=async()=>{
  try{
    const remote=JSON.parse(code.value);
    if(!pc) pc=new RTCPeerConnection(config);
    
    if(remote.type==="offer"){ // kita jadi answerer
      pc.ondatachannel=e=>{dc=e.channel;setDC()}
      pc.onicecandidate=()=>{if(pc.localDescription)code.value=JSON.stringify(pc.localDescription)};
      await pc.setRemoteDescription(remote);
      const ans=await pc.createAnswer();
      await pc.setLocalDescription(ans);
      code.select(); navigator.clipboard.writeText(code.value); // auto copy
      toast("Answer disalin");
      add("Kirim Answer ini ke teman","status");
    }
    
    if(remote.type==="answer"){ // kita terima answer
      await pc.setRemoteDescription(remote);
    }
  }catch{add("Kode salah!","status")}
}

// KIRIM CHAT
btnKirim.onclick=()=>{
  if(msg.value && dc.readyState==="open"){
    dc.send(msg.value);
    add(msg.value,"me");
    msg.value="";
  }
}
msg.onkeypress=e=>{if(e.key==="Enter")btnKirim.click()}
</script>
</body>
</html>
