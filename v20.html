<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Editor Stable</title>

<style>
body, html {
  margin:0;
  padding:0;
  font-family:system-ui,sans-serif;
  height:100%;
  display:flex;
  flex-direction:column;
  background:#f9f9f9;
}

#editorContainer{
  padding:10px;
  background:#fff;
  border-bottom:1px solid #ccc;
}

textarea{
  width:100%;
  min-height:140px;
  font-family:monospace;
  font-size:14px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-top:5px;
}

.button-row{
  display:flex;
  gap:5px;
  margin-top:10px;
  flex-wrap:wrap;
}

button, select{
  flex:1;
  padding:10px;
  font-size:14px;
  border-radius:8px;
  border:1px solid #888;
}

.top-bar{
  position:sticky;
  top:0;
  background:#fff;
  z-index:10;
}

#output{
  flex:1;
  border:none;
}

/* notif */
.notif{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:#fff;
  padding:10px;
  border-radius:6px;
  display:none;
}
</style>
</head>

<body>

<div id="editorContainer">

  <!-- TOP BAR -->
  <div class="button-row top-bar">
    <button onclick="toggleEditor()">🔽</button>
    <button onclick="pasteCode()">📋</button>

    <!-- DROPDOWN NAMESPACE -->
    <select id="namespaceSelect" onchange="changeNamespace()"></select>
  </div>

  <!-- EDITOR -->
  <textarea id="codeInput" placeholder="Tulis kode HTML/JS di sini..."></textarea>

  <!-- RUN -->
  <div class="button-row">
    <button onclick="runCode()">▶️ Run</button>
    <button onclick="clearCode()">🗑️</button>
    <button onclick="copyCode()">📋</button>
  </div>

  <!-- PROJECT -->
  <div class="button-row">
    <button onclick="saveProject()">💾 Save</button>
    <button onclick="saveAsProject()">💾 Save As</button>
    <button onclick="renameProject()">✏️ Rename</button>
  </div>

  <!-- SELECT PROJECT -->
  <select id="projectSelect" onchange="loadSelectedProject()"></select>
  <button onclick="deleteProject()">❌ Delete</button>

</div>

<iframe id="output" sandbox="allow-scripts"></iframe>
<div id="notif" class="notif"></div>

<script>
let NAMESPACE = "editor_v2_";

// ===== NOTIF =====
function showNotif(msg){
  const n = document.getElementById("notif");
  n.innerText = msg;
  n.style.display = "block";
  setTimeout(()=> n.style.display="none",2000);
}

// ===== EDITOR =====
function runCode(){
  output.srcdoc = codeInput.value;
}

function clearCode(){
  if(confirm("Clear?")){
    codeInput.value='';
    output.srcdoc='';
  }
}

async function pasteCode(){
  try{
    const text = await navigator.clipboard.readText();
    codeInput.value = text;
    runCode();
    showNotif("Paste & run");
  }catch{
    showNotif("Gagal paste");
  }
}

async function copyCode(){
  await navigator.clipboard.writeText(codeInput.value);
  showNotif("Copied");
}

function toggleEditor(){
  const el = document.getElementById('editorContainer');
  Array.from(el.children).forEach(child=>{
    if(!child.classList.contains('top-bar')){
      child.style.display = (child.style.display==='none')?'block':'none';
    }
  });
}

// ===== NAMESPACE SYSTEM =====
function saveNamespace(ns){
  localStorage.setItem(ns + "__meta", "1");
}

function getNamespaces(){
  const keys = Object.keys(localStorage);
  const set = new Set();

  keys.forEach(k=>{
    if(k.endsWith("__meta")){
      set.add(k.replace("__meta",""));
    }
  });

  return Array.from(set);
}

function updateNamespaceList(){
  const sel = document.getElementById("namespaceSelect");
  sel.innerHTML="";

  const list = getNamespaces();

  list.forEach(ns=>{
    const opt = document.createElement("option");
    opt.value = ns;
    opt.textContent = ns.replace("_","");
    sel.appendChild(opt);
  });

  const newOpt = document.createElement("option");
  newOpt.value = "NEW";
  newOpt.textContent = "➕ New Editor";
  sel.appendChild(newOpt);

  sel.value = NAMESPACE;
}

function changeNamespace(){
  const val = namespaceSelect.value;

  if(val === "NEW"){
    const name = prompt("Nama editor baru:");
    if(!name) return;

    const ns = name + "_";

    saveNamespace(ns); // simpan permanen
    NAMESPACE = ns;

  }else{
    NAMESPACE = val;
  }

  updateNamespaceList();
  updateProjectList();
  showNotif("Switch: "+NAMESPACE);
}

// ===== STORAGE =====
function getNextIndex(){
  let i=1;
  while(localStorage.getItem(NAMESPACE+'project'+i)) i++;
  return i;
}

function saveProject(){
  localStorage.setItem(NAMESPACE+'project'+getNextIndex(), codeInput.value);
  updateProjectList();
  showNotif("Saved");
}

function saveAsProject(){
  const name = prompt("Nama:");
  if(!name) return;

  localStorage.setItem(NAMESPACE+name, codeInput.value);
  updateProjectList();
  showNotif("Saved As");
}

function renameProject(){
  const old = projectSelect.value;
  if(!old) return;

  const name = prompt("Rename:");
  if(!name) return;

  const code = localStorage.getItem(old);
  localStorage.setItem(NAMESPACE+name, code);
  localStorage.removeItem(old);

  updateProjectList();
  showNotif("Renamed");
}

function loadSelectedProject(){
  const code = localStorage.getItem(projectSelect.value);
  codeInput.value = code;
  runCode();
}

function deleteProject(){
  if(confirm("Delete?")){
    localStorage.removeItem(projectSelect.value);
    updateProjectList();
    showNotif("Deleted");
  }
}

function updateProjectList(){
  projectSelect.innerHTML="";

  Object.keys(localStorage)
    .filter(k=>k.startsWith(NAMESPACE) && !k.endsWith("__meta"))
    .forEach(k=>{
      const opt = document.createElement("option");
      opt.value = k;
      opt.textContent = k.replace(NAMESPACE,"");
      projectSelect.appendChild(opt);
    });
}

// ===== INIT =====
if(!localStorage.getItem("editor_v2___meta")){
  saveNamespace("editor_v2_");
}

updateNamespaceList();
updateProjectList();
</script>

</body>
</html>
