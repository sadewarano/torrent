<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>P2P Chat Simple</title>
<style>
body{font-family:system-ui;background:#f0f2f5;padding:16px;max-width:500px;margin:auto}
.card{background:#fff;padding:14px;border-radius:12px;margin:10px 0;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.status{text-align:center;color:#666;font-size:.9em}
textarea{width:100%;height:120px;border:1px solid #ccc;border-radius:8px;padding:8px;box-sizing:border-box;font-family:monospace;font-size:.8em}
.row{display:flex;gap:8px}
button{flex:1;padding:12px;border:none;border-radius:8px;background:#007bff;color:#fff;font-weight:600;cursor:pointer}
button:disabled{background:#aaa}
#btnProses{background:#28a745}
#chat{height:220px;overflow-y:auto;border:1px solid #ddd;padding:8px;border-radius:8px;background:#fafafa}
.msg{padding:6px 10px;border-radius:8px;margin:4px 0;max-width:80%}
.me{background:#dcf8c6;margin-left:auto}
.peer{background:#fff;border:1px solid #eee}
.sys{text-align:center;font-size:.8em;color:#888}
input{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box}
.spinner{border:3px solid #f3f3f3;border-top:3px solid #007bff;border-radius:50%;width:16px;height:16px;animation:spin 1s linear infinite;display:inline-block;margin-right:6px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
</style>
</head>
<body>

<h2>🌐 P2P Chat Simple</h2>
<div class="card"><div class="status" id="status">Status: Belum konek</div></div>

<div class="card">
<b>Kode Offer / Answer</b>
<textarea id="code" placeholder="1. Klik Buat 
2. Tunggu 'Siap' lalu kirim ke teman
3. Tempel balasan lalu Proses"></textarea>
<div class="row">
<button id="btnBuat">🟢 Buat</button>
<button id="btnProses">🔵 Proses</button>
</div>
</div>

<div class="card">
<b>Chat</b>
<div id="chat"></div>
<input id="msg" placeholder="Ketik pesan...">
<button id="btnKirim" disabled>Kirim</button>
</div>

<script>
const status = document.getElementById("status");
const code = document.getElementById("code");
const chat = document.getElementById("chat");
const msg = document.getElementById("msg");
const btnKirim = document.getElementById("btnKirim");

let pc, dc;
const config = {iceServers: [
  {urls: "stun:stun.l.google.com:19302"},
  {urls: "stun:stun1.l.google.com:19302"}
]};

function add(t, cls){const d=document.createElement("div");d.className="msg "+cls;d.textContent=t;chat.appendChild(d);chat.scrollTop=chat.scrollHeight}

function setDC(){
  dc.onopen=()=>{status.textContent="Status: Konek ✅";btnKirim.disabled=false;add("Konek!","sys")}
  dc.onmessage=e=>add(e.data,"peer")
  dc.onclose=()=>{status.textContent="Status: Putus ❌";btnKirim.disabled=true}
}

// BUAT OFFER - TUNGGU SAMPAI SELESAI
btnBuat.onclick=async()=>{
  if(pc){ add("Putuskan dulu","sys"); return; }
  pc=new RTCPeerConnection(config);
  dc=pc.createDataChannel("chat");
  setDC();
  
  status.innerHTML = '<span class="spinner"></span>Mengumpulkan kandidat...';
  btnBuat.disabled = true;
  
  pc.onicecandidate=e=>{
    if(!e.candidate){ // baru copy kalau selesai
      code.value=JSON.stringify(pc.localDescription);
      navigator.clipboard.writeText(code.value);
      status.textContent="Status: Offer siap. Sudah disalin";
      btnBuat.disabled = false;
      add("Kirim kode ini ke teman","sys");
    }
  };
  
  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);
};

// PROSES
btnProses.onclick=async()=>{
  try{
    const remote=JSON.parse(code.value);
    if(!pc) pc=new RTCPeerConnection(config);
    
    if(remote.type==="offer"){
      pc.ondatachannel=e=>{dc=e.channel;setDC()}
      pc.onicecandidate=e=>{
        if(!e.candidate){
          code.value=JSON.stringify(pc.localDescription);
          navigator.clipboard.writeText(code.value);
          status.textContent="Status: Answer siap. Sudah disalin";
          add("Kirim Answer ini balik","sys");
        }
      };
      await pc.setRemoteDescription(remote);
      const ans=await pc.createAnswer();
      await pc.setLocalDescription(ans);
      status.innerHTML = '<span class="spinner"></span>Membuat Answer...';
    }
    
    if(remote.type==="answer"){
      await pc.setRemoteDescription(remote);
      status.textContent="Status: Menghubungkan...";
    }
  }catch{add("Kode salah!","sys")}
}

// KIRIM
btnKirim.onclick=()=>{
  if(dc && dc.readyState==="open" && msg.value){
    dc.send(msg.value);
    add(msg.value,"me");
    msg.value="";
  }
}
msg.onkeypress=e=>{if(e.key==="Enter")btnKirim.click()}
</script>
</body>
</html>
