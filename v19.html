<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>P2P Group Chat Mesh</title>
<style>
body{font-family:system-ui;background:#f0f2f5;padding:16px;max-width:700px;margin:auto}
.card{background:#fff;padding:16px;border-radius:12px;margin:10px 0}
textarea{width:100%;height:100px;border:1px solid #ccc;border-radius:8px;padding:8px;box-sizing:border-box;font-family:monospace}
input{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box}
button{padding:10px 16px;border:none;border-radius:8px;background:#007bff;color:#fff;font-weight:600;margin:4px 0;cursor:pointer}
#chatBox{height:250px;overflow-y:auto;border:1px solid #ddd;padding:10px;border-radius:8px;background:#fafafa}
.peerTag{font-size:0.8em;color:#007bff;font-weight:bold}
</style>
</head>
<body>

<h2>🌐 P2P Group Chat - Mesh 3+ Orang</h2>

<div class="card">
  <b>Nama Kamu:</b> <input id="myName" placeholder="Contoh: Bima">
  <button onclick="start()">1. Mulai / Gabung Room</button>
</div>

<div class="card">
  <h3>2. Tukeran Kode</h3>
  <p>Kode kamu. Copy kirim ke semua teman:</p>
  <textarea id="myCode" readonly></textarea>
  <p>Tempel kode teman di sini, 1 baris 1 orang:</p>
  <textarea id="theirCode" placeholder='{"from":"Bima","sdp":{...}}'></textarea>
  <button onclick="addPeer()">3. Tambah Peer</button>
</div>

<div class="card">
  <h3>Chat Group</h3>
  <div id="chatBox"></div>
  <input id="msgInput" placeholder="Ketik pesan ke semua...">
  <button onclick="broadcast()">Kirim ke Semua</button>
</div>

<script>
const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };
let myName = "";
let pcList = {}; // {nama: {pc, dc}}
let myOffers = {}; // simpan offer kita

function log(msg, from="System"){
  const div = document.createElement("div");
  div.innerHTML = `<span class="peerTag">${from}:</span> ${msg}`;
  document.getElementById("chatBox").appendChild(div);
}

function start(){
  myName = document.getElementById("myName").value || "Anon";
  log("Kamu join sebagai " + myName);
}

// BUAT OFFER UNTUK 1 ORANG
async function makeOffer(peerName){
  const pc = new RTCPeerConnection(config);
  const dc = pc.createDataChannel("chat");

  setupDC(peerName, dc);
  pcList[peerName] = {pc, dc};

  pc.onicecandidate = (e) => {
    if(e.candidate == null){
      myOffers[peerName] = JSON.stringify({from:myName, sdp:pc.localDescription});
      document.getElementById("myCode").value = JSON.stringify(myOffers);
    }
  };
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
}

// TERIMA KODE TEMAN
async function addPeer(){
  const codes = document.getElementById("theirCode").value.split('\n').filter(Boolean);
  for(const codeStr of codes){
    const data = JSON.parse(codeStr);
    const peerName = data.from;
    const remoteSDP = data.sdp;

    if(pcList[peerName]) continue; // udah ada

    const pc = new RTCPeerConnection(config);
    pcList[peerName] = {pc, dc:null};

    pc.ondatachannel = (e) => { // kita yg terima
      setupDC(peerName, e.channel);
      pcList[peerName].dc = e.channel;
    };
    pc.onicecandidate = (e) => {
      if(e.candidate == null){
        const answer = JSON.stringify({from:myName, sdp:pc.localDescription});
        log(`Copy Answer ini dan kirim ke ${peerName}: ${answer}`);
      }
    };

    if(remoteSDP.type === "offer"){
      await pc.setRemoteDescription(remoteSDP);
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
    }
    if(remoteSDP.type === "answer"){
      await pc.setRemoteDescription(remoteSDP);
    }
  }
}

function setupDC(peerName, dc){
  dc.onopen = () => log("Konek ke " + peerName + " ✅");
  dc.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    log(msg.text, msg.from);
  };
}

// KIRIM KE SEMUA
function broadcast(){
  const msg = document.getElementById("msgInput").value;
  if(!msg) return;
  log(msg, myName);
  Object.values(pcList).forEach(p=>{
    if(p.dc && p.dc.readyState === "open"){
      p.dc.send(JSON.stringify({from:myName, text:msg}));
    }
  });
  document.getElementById("msgInput").value = "";
}
</script>
</body>
</html>
