<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>P2P Chat Cepat + Copy</title>
<style>
body{font-family:system-ui;background:#f0f2f5;padding:16px;max-width:600px;margin:auto}
.card{background:#fff;padding:16px;border-radius:12px;margin:10px 0;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
h2{margin:0 0 10px 0}
textarea{width:100%;height:80px;border:1px solid #ccc;border-radius:8px;padding:8px;box-sizing:border-box;font-family:monospace;font-size:0.85em}
input{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box}
.row{display:flex;gap:8px}
button{flex:1;padding:12px;border:none;border-radius:8px;background:#007bff;color:#fff;font-weight:600;margin:6px 0;cursor:pointer}
button.copy{background:#28a745}
button:disabled{background:#aaa}
#chatBox{height:250px;overflow-y:auto;border:1px solid #ddd;padding:10px;border-radius:8px;background:#fafafa}
.msg{padding:6px 10px;border-radius:8px;margin:4px 0;max-width:80%;word-wrap:break-word}
.me{background:#dcf8c6;margin-left:auto}
.peer{background:#fff;border:1px solid #eee}
.status{font-size:0.9em;color:#666;text-align:center}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 16px;border-radius:20px;font-size:0.9em;display:none}
</style>
</head>
<body>

<h2>🌐 P2P Chat Cepat</h2>

<div class="card">
  <b class="status" id="status">Status: Belum Konek</b>
</div>

<div class="card">
  <h3>Langkah 1: Buat Koneksi</h3>
  <button id="btnOffer">1. Aku Yang Buat Offer</button>
  <textarea id="localSDP" placeholder="Kode Offer/Answer muncul otomatis di sini" readonly></textarea>
  <div class="row">
    <button class="copy" onclick="copyCode('localSDP')">📋 Copy Kode</button>
  </div>
</div>

<div class="card">
  <h3>Langkah 2: Tempel Jawaban</h3>
  <textarea id="remoteSDP" placeholder="Tempel kode dari teman di sini"></textarea>
  <button id="btnAnswer">2. Set Remote & Konek</button>
</div>

<div class="card">
  <h3>Chat</h3>
  <div id="chatBox"></div>
  <input id="msgInput" placeholder="Ketik pesan...">
  <button id="btnSend" disabled>Kirim</button>
</div>

<div class="toast" id="toast">Tersalin!</div>

<script>
const status = document.getElementById("status");
const localSDP = document.getElementById("localSDP");
const remoteSDP = document.getElementById("remoteSDP");
const chatBox = document.getElementById("chatBox");
const msgInput = document.getElementById("msgInput");
const btnSend = document.getElementById("btnSend");

let pc; 
let dc; 

const config = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" },
    { urls: "stun:stun1.l.google.com:19302" }
  ]
};

function addMsg(text, who){
  const div = document.createElement("div");
  div.className = "msg " + who;
  div.textContent = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none", 1500);
}

function copyCode(id){
  const el = document.getElementById(id);
  el.select();
  navigator.clipboard.writeText(el.value);
  toast("Tersalin!");
}

// FIX: Update tiap ada candidate baru biar ga nunggu lama
function updateSDP(){
  if(pc && pc.localDescription){
    localSDP.value = JSON.stringify(pc.localDescription);
  }
}

function setupDataChannel(){
  dc.onopen = () => {
    status.textContent = "Status: Konek ✅";
    btnSend.disabled = false;
    addMsg("Konek P2P berhasil!", "status");
  };
  dc.onmessage = (e) => {
    addMsg(e.data, "peer");
  };
  dc.onclose = () => {
    status.textContent = "Status: Putus ❌";
    btnSend.disabled = true;
  };
}

document.getElementById("btnOffer").onclick = async () => {
  pc = new RTCPeerConnection(config);
  dc = pc.createDataChannel("chat");
  setupDataChannel();

  pc.onicecandidate = (e) => {
    updateSDP(); // update terus
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  updateSDP();
  addMsg("Copy kode di atas, kirim ke teman", "status");
};

document.getElementById("btnAnswer").onclick = async () => {
  try{
    const remoteDesc = JSON.parse(remoteSDP.value);
    if(!pc) pc = new RTCPeerConnection(config);

    if(remoteDesc.type === "offer"){
      pc.ondatachannel = (e) => { 
        dc = e.channel;
        setupDataChannel();
      };
      pc.onicecandidate = (e) => { updateSDP(); };

      await pc.setRemoteDescription(remoteDesc);
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      updateSDP();
      addMsg("Copy Answer di atas, kirim balik ke teman", "status");
    }
    
    if(remoteDesc.type === "answer"){
      await pc.setRemoteDescription(remoteDesc);
    }
  }catch(e){
    addMsg("Kode salah! Cek lagi", "status");
  }
};

btnSend.onclick = () => {
  const msg = msgInput.value;
  if(msg && dc && dc.readyState === "open"){
    dc.send(msg);
    addMsg(msg, "me");
    msgInput.value = "";
  }
};
msgInput.onkeypress = (e) => { if(e.key === "Enter") btnSend.onclick(); }

</script>
</body>
</html>
