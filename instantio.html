<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WebTorrent Auto Seeder v3 FIX</title>
<script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
<style>
body{font-family:system-ui;padding:16px;max-width:600px;margin:auto;background:#f5f5f5}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;box-sizing:border-box}
button{border:none;color:#fff;font-weight:600;cursor:pointer}
.btn-copy{background:#2196F3}
.card{background:#fff;padding:12px;border-radius:8px;margin:10px 0}
.torrent{border-left:4px solid #ccc;padding:8px;margin:8px 0;background:#fafafa}
.torrent.active{border-left:4px solid #FF9800}
.torrent.done{border-left:4px solid #4CAF50}
.torrent.dead{border-left:4px solid #f44336;opacity:0.6}
.torrent.prog{font-size:0.85em;color:#555}
</style></head><body>
<h2>🌱 WebTorrent Auto Seeder v3</h2>

<input id="magnet" placeholder="Tempel magnet / hash BTIH manual">
<button class="btn-copy" onclick="addManual()">➕ Tambah & Download</button>

<div class="card" id="info">ℹ️ Menunggu magnet baru dari GAS...</div>
<div class="card">Seeder Aktif: <span id="count">0</span>/5 | Slot Kosong: <span id="slot">5</span></div>

<div class="card">
<h3>🌐 Daftar Seeder Aktif Max 5</h3>
<div id="listSeeder"></div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbwCi-pP169wRNLiieaXqn_hfejzSEm2HGGk0EpL2krYTmKkz6ky1_WoBsVcw3F3YxJoBg/exec";
const MAX_SEEDER = 5;
const DEAD_TIMEOUT = 30000; // 30 detik
const client=new WebTorrent();
let seeders = {}; // {hash: {torrent, lastPeerTime, status}}
let lastList = [];

function log(t){info.textContent=t}
function extractHash(v){let m=v.match(/btih:([a-f0-9]{40})/i);if(m)return m[1];if(/^[a-f0-9]{40}$/i.test(v))return v;return null;}
function buildMagnet(h){let m='magnet:?xt=urn:btih:'+h;["wss://tracker.openwebtorrent.com","wss://tracker.btorrent.xyz"].forEach(tr=>m+="&tr="+encodeURIComponent(tr));return m;}

/* TAMBAH MANUAL */
function addManual(){
  let h = extractHash(magnet.value.trim());
  if(!h){alert("Hash tidak valid");return;}
  addTorrent(h, "Manual");
}

/* FUNGSI UTAMA: TAMBAH TORRENT */
function addTorrent(hash, sumber="GAS"){
  if(seeders[hash]) { // FIX 1: cek per hash
    log("ℹ️ "+hash.substring(0,8)+"... sudah jadi seeder");
    return;
  }

  // Cari slot kosong. Prioritas hapus yg "dead" dulu
  if(Object.keys(seeders).length >= MAX_SEEDER){
    let deadKey = Object.keys(seeders).find(k => seeders[k].status === 'dead');
    if(deadKey){
      remove(deadKey, "Dead");
    }else{
      let firstHash = Object.keys(seeders)[0];
      remove(firstHash, "Penuh");
    }
  }

  log(`⬇️ ${sumber} Download: ${hash.substring(0,8)}...`);
  client.add(buildMagnet(hash), t=>{
    // FIX 2: simpan per hash
    seeders[hash] = {torrent: t, lastPeerTime: Date.now(), status: 'downloading'};
    updateUI();

    t.on("wire", ()=>{
      seeders[hash].lastPeerTime = Date.now();
      if(seeders[hash].status === 'dead') seeders[hash].status = 'downloading'; // hidup lagi
      updateUI();
    });
    t.on("download", ()=> updateUI());

    t.on("done", ()=>{
      seeders[hash].status = 'seeding';
      log(`✅ ${hash.substring(0,8)}... Selesai. Mode Seeder`);
      updateUI();
    });

    t.on("error", (err)=>{
      log(`❌ Error ${hash.substring(0,8)}: ${err.message}`);
      seeders[hash].status = 'dead';
    });
  });
}

/* HEALTH CHECK: TENDANG YG MATI */
function healthCheck(){
  let now = Date.now();
  Object.keys(seeders).forEach(hash=>{
    let s = seeders[hash]; // FIX 3
    let t = s.torrent;

    if(s.status === 'downloading' && t.numPeers === 0 && now - s.lastPeerTime > DEAD_TIMEOUT){
      s.status = 'dead';
      log(`💀 ${hash.substring(0,8)}... Mati. Tidak ada peer 30s`);
      setTimeout(()=>{ if(seeders[hash] && seeders[hash].status==='dead') remove(hash, "Timeout"); }, 5000);
    }
  });
  updateUI();
}

/* HAPUS TORRENT */
function remove(hash, alasan="Manual"){
  if(seeders[hash]){ // FIX 4
    seeders[hash].torrent.destroy();
    delete seeders[hash];
    log(`🗑️ Hapus ${hash.substring(0,8)}... Alasan: ${alasan}`);
  }
}

/* UPDATE UI */
function updateUI(){
  let keys = Object.keys(seeders);
  count.textContent = keys.length;
  slot.textContent = MAX_SEEDER - keys.length;
  listSeeder.innerHTML = "";

  keys.forEach(hash=>{
    let s = seeders[hash]; // FIX 5
    let t = s.torrent;
    let div = document.createElement("div");

    let cls = "torrent ";
    if(s.status==='seeding') cls += "done";
    else if(s.status==='dead') cls += "dead";
    else cls += "active";
    div.className = cls;

    let prog = Math.round(t.progress*100);
    let peers = t.numPeers;
    let statusTxt = s.status==='seeding'?"Seeding":s.status==='dead'?"Dead":"Downloading";

    div.innerHTML = `
      <b>${hash.substring(0,16)}...</b><br>
      <div class="prog">Status: ${statusTxt} | ${prog}% | Peer: ${peers}</div>
      <button onclick="copy('${hash}')" style="width:auto;padding:4px 8px;font-size:0.8em;background:#2196F3;color:#fff;border:none;border-radius:4px;margin-top:4px">📋 Copy</button>
      <button onclick="remove('${hash}')" style="width:auto;padding:4px 8px;font-size:0.8em;background:#f44336;color:#fff;border:none;border-radius:4px;margin-top:4px">❌ Stop</button>
    `;
    listSeeder.appendChild(div);
  });
}

function copy(hash){navigator.clipboard.writeText("magnet:?xt=urn:btih:"+hash);log("📋 Disalin");}

/* CEK GAS TIAP 3 DETIK */
async function cekGAS(){
  try{
    const res=await fetch(API+"?t="+Date.now());
    const data=await res.json();
    let kode="";
    if(Array.isArray(data)&&data.length){kode=data[data.length-1].kode||"";}
    else if(data&&data.kode){kode=data.kode;}
    if(!kode) return;

    let arr = kode.split(",").filter(Boolean).map(extractHash).filter(Boolean);

    let isNew = JSON.stringify(arr)!== JSON.stringify(lastList);
    if(isNew){
      log("🆕 Magnet baru terdeteksi dari GAS");
      arr.forEach(hash=>{
        if(!seeders[hash]) addTorrent(hash, "GAS"); // FIX 6
      });
      lastList = arr;
    }
  }catch(e){console.log("Error cek GAS", e)}
}

cekGAS();
setInterval(cekGAS, 3000);
setInterval(healthCheck, 10000);
</script></body></html>
