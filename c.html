<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WebTorrent Log Only</title>
<script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
<style>
body{font-family:system-ui;padding:16px;max-width:600px;margin:auto;background:#f5f5f5}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;box-sizing:border-box}
button{border:none;background:#2196F3;color:#fff;font-weight:600;cursor:pointer}
.card{background:#fff;padding:12px;border-radius:8px;margin:10px 0}
.badge{font-size:0.7em;background:#6366f1;color:#fff;padding:2px 6px;border-radius:4px}
.log{font-size:0.8em;background:#111;color:#0f0;padding:10px;border-radius:4px;max-height:400px;overflow:auto;font-family:monospace;white-space:pre-wrap}
</style></head><body>
<h2>🌱 WebTorrent Auto Seeder <span class="badge">RAREST</span></h2>

<input id="magnet" placeholder="Tempel magnet BTIH disini">
<button onclick="addManual()">➕ TAMBAH & SEED</button>
<button onclick="clearLog()" style="background:#666">🧹 Clear Log</button>

<div class="card">Status: <span id="info">Idle</span> | Aktif: <span id="count">0</span>/5 Torrent</div>

<div class="card">
<h3>📜 Log Aktivitas</h3>
<div id="logBox" class="log"></div>
</div>

<script>
const TRACKERS = [
  "wss://tracker.openwebtorrent.com",
  "wss://tracker.btorrent.xyz",
  "wss://tracker.webtorrent.dev"
];
const MAX_SEEDER = 5;
const client = new WebTorrent();
let seeders = {}; // {hash: torrent}

function log(t){
  document.getElementById('info').textContent = t;
  let box = document.getElementById('logBox');
  box.innerHTML += `[${new Date().toLocaleTimeString()}] ${t}\n`;
  box.scrollTop = box.scrollHeight;
}

function clearLog(){
  document.getElementById('logBox').innerHTML = "";
}

function extractHash(v){
  let m=v.match(/btih:([a-f0-9]{40})/i);
  if(m)return m[1].toLowerCase();
  if(/^[a-f0-9]{40}$/i.test(v))return v.toLowerCase();
  return null;
}

function buildMagnet(h){
  let m='magnet:?xt=urn:btih:'+h;
  TRACKERS.forEach(tr=>m+="&tr="+encodeURIComponent(tr));
  return m;
}

function addManual(){
  let h = extractHash(magnet.value.trim());
  if(!h){alert("Hash tidak valid");return;}
  addTorrent(h, "Manual");
}

function addTorrent(hash, sumber="GAS"){
  if(seeders.hasOwnProperty(hash)){
    log(`Skip: ${hash.substring(0,8)}... sudah aktif`);
    return;
  }
  if(Object.keys(seeders).length >= MAX_SEEDER){
    let firstHash = Object.keys(seeders)[0];
    remove(firstHash);
  }

  log(`⬇️ ${sumber}: Menambah ${hash.substring(0,8)}...`);

  client.add(buildMagnet(hash), {
    strategy: 'rarest', // Kunci biar gak stuck 89%
    announce: TRACKERS,
    maxConns: 100
  }, t=>{
    seeders = t;
    updateCount();
    log(`✅ JOIN: ${t.name} | Hash: ${hash.substring(0,8)}`);

    t.on('metadata', ()=> log(`📦 Metadata: ${t.name} | Size: ${formatBytes(t.length)}`));

    t.on('download', ()=> {
      if(Math.round(t.progress*100) % 5 === 0){ // log tiap 5%
        log(`⬇️ ${t.name} | ${Math.round(t.progress*100)}% | Peer: ${t.numPeers} | ↓${formatBytes(t.downloadSpeed)}/s ↑${formatBytes(t.uploadSpeed)}/s`);
      }
    });

    t.on('wire', ()=> log(`🔗 Peer baru: ${t.name} | Total Peer: ${t.numPeers}`));

    t.on('done', ()=> {
      log(`✅ 100% SEEDING: ${t.name}`);
      updateCount();
    });

    t.on('error', (err)=> {
      log(`❌ ERROR: ${hash.substring(0,8)}... | ${err.message}`);
      delete seeders;
      updateCount();
    });
  });
}

function updateCount(){
  document.getElementById('count').textContent = Object.keys(seeders).length;
}

function formatBytes(b){
  if(b===0)return '0B';
  const k=1024;
  const sizes=['B','KB','MB','GB'];
  const i=Math.floor(Math.log(b)/Math.log(k));
  return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+sizes[i];
}

function remove(hash){
  if(seeders){
    seeders.destroy();
    delete seeders;
  }
  log(`🗑️ STOP: ${hash.substring(0,8)}...`);
  updateCount();
}

// Auto cek GAS tiap 3 detik
setInterval(async ()=>{
  try{
    const res=await fetch("https://script.google.com/macros/s/AKfycbwCi-pP169wRNLiieaXqn_hfejzSEm2HGGk0EpL2krYTmKkz6ky1_WoBsVcw3F3YxJoBg/exec?t="+Date.now());
    const data=await res.json();
    let kode = Array.isArray(data)? data[data.length-1].kode : data.kode;
    if(!kode) return;
    let arr = [...new Set(kode.split(",").filter(Boolean).map(extractHash).filter(Boolean))];
    arr.forEach(h=>{
      if(!seeders.hasOwnProperty(h)) addTorrent(h, "GAS");
    });
  }catch(e){
    log(`❌ GAS Error: ${e.message}`);
  }
}, 3000);

log("🚀 WebTorrent Siap. Menunggu magnet dari Manual / GAS...");
</script></body></html>
