<!DOCTYPE html>
<html>
<body>

<input id="kode" placeholder="masukkan kode">
<button onclick="kirim()">Kirim</button>

<table border="1">
<tbody id="hasil"></tbody>
</table>

<script>

const API="https://script.google.com/macros/s/AKfycbwU3k3QpUNzeeyt9R4sOxKgyzvcjYKlj37hPR8035w7wRZHc-C_ZQr1Cu3k1pT4DBJqCg/exec";

function kirim(){
fetch(API,{
method:"POST",
body:JSON.stringify({kode:kode.value})
});
kode.value="";
}

function ambil(){
fetch(API)
.then(r=>r.json())
.then(d=>{
hasil.innerHTML=d.map(x=>`<tr><td>${x.waktu}</td><td>${x.kode}</td></tr>`).join("");
});
}

ambil();
setInterval(ambil,3000);

</script>

</body>
</html>
