<!DOCTYPE html>
<html>
<body>

<input id="kode" placeholder="Masukkan kode">
<button onclick="kirim()">Kirim</button>
<button onclick="hapusSemua()">Hapus Semua</button>
<button id="ambilBtn">Ambil Peer ID</button>

<table border="1">
  <tbody id="hasil"></tbody>
</table>

<script>
const API="https://script.google.com/macros/s/AKfycbwCi-pP169wRNLiieaXqn_hfejzSEm2HGGk0EpL2krYTmKkz6ky1_WoBsVcw3F3YxJoBg/exec";

function kirim(){
  if(!kode.value.trim()) return;
  fetch(API,{
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body:JSON.stringify({kode:kode.value.trim()})
  });
  kode.value="";
}

function hapusSemua(){
  fetch(API,{
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body:JSON.stringify({reset:true})
  })
  .then(()=>ambil());
}

function ambil(){
  fetch(API+"?t="+Date.now())
    .then(r=>r.json())
    .then(d=>{
      if(!d) {
        hasil.innerHTML="";
        return;
      }

      let lastData = null;

      if(Array.isArray(d) && d.length){
        lastData = d[d.length - 1]; // ambil baris terakhir
      } else if(d && d.kode){
        lastData = d; // object tunggal
      }

      if(lastData){
        hasil.innerHTML=`<tr><td>${lastData.waktu}</td><td>${lastData.kode}</td></tr>`;
      } else {
        hasil.innerHTML="";
      }
    });
}

// ambil data setiap 3 detik
ambil();
setInterval(ambil,3000);

// ===== Tombol Ambil Peer ID dari Tabel =====
const ambilBtn = document.getElementById("ambilBtn");
ambilBtn.onclick = async () => {
  try {
    const table = document.getElementById("hasil");
    const rows = table.getElementsByTagName("tr");
    if(rows.length === 0){
      alert("Belum ada data Peer ID");
      return;
    }
    const lastRow = rows[rows.length - 1];
    const peerId = lastRow.cells[1].innerText;

    // salin ke clipboard
    await navigator.clipboard.writeText(peerId);
    alert("Peer ID disalin: " + peerId);

  } catch (err) {
    console.error("Gagal ambil Peer ID dari tabel:", err);
    alert("Gagal ambil data dari tabel");
  }
};
</script>

</body>
</html>
