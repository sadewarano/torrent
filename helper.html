<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2P Link Stack</title>

<style>
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: #f4f4f4;
  padding: 10px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: #fff;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input, button {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  font-size: 16px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  background-color: #4CAF50;
  color: white;
  border: none;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ccc;
  padding: 10px;
  font-size: 14px;
  word-break: break-word;
}

a {
  color: blue;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="container">
  <input id="kode" placeholder="Masukkan link">

  <button id="kirimBtn">Tambah Link</button>
  <button id="copyBtn">Copy Link Terbaru</button>

  <table>
    <thead>
      <tr>
        <th>No</th>
        <th>Link</th>
      </tr>
    </thead>
    <tbody id="hasil"></tbody>
  </table>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwCi-pP169wRNLiieaXqn_hfejzSEm2HGGk0EpL2krYTmKkz6ky1_WoBsVcw3F3YxJoBg/exec";

// ===== TAMBAH DATA (STACK) =====
async function kirim() {
  const input = document.getElementById("kode");
  let value = input.value.trim();

  if (!value) return;

  try {
    // Ambil data lama
    const res = await fetch(API + "?t=" + Date.now());
    const data = await res.json();

    let lastKode = "";

    if (Array.isArray(data) && data.length) {
      lastKode = data[data.length - 1].kode || "";
    } else if (data && data.kode) {
      lastKode = data.kode;
    }

    // Jadi array
    let arr = lastKode ? lastKode.split(",") : [];

    // Tambah di depan
    arr.unshift(value);

    // Max 5
    arr = arr.slice(0, 5);

    // Gabung lagi
    const finalKode = arr.join(",");

    // Kirim ke GAS
    await fetch(API, {
      method: "POST",
      body: JSON.stringify({kode: finalKode})
    });

    input.value = "";
    ambil();

  } catch (err) {
    alert("Gagal kirim!");
  }
}

// ===== AMBIL DATA =====
async function ambil() {
  try {
    const res = await fetch(API + "?t=" + Date.now());
    const data = await res.json();

    const hasil = document.getElementById("hasil");
    hasil.innerHTML = "";

    let kode = "";

    if (Array.isArray(data) && data.length) {
      kode = data[data.length - 1].kode || "";
    } else if (data && data.kode) {
      kode = data.kode;
    }

    if (!kode) return;

    const arr = kode.split(",");

    arr.forEach((link, i) => {
      let url = link.trim();

      if (!url.startsWith("http")) {
        url = "https://" + url;
      }

      hasil.innerHTML += `
        <tr>
          <td>${i + 1}</td>
          <td><a href="${url}" target="_blank">${url}</a></td>
        </tr>
      `;
    });

  } catch (err) {
    console.error(err);
  }
}

// ===== COPY TERBARU =====
document.getElementById("copyBtn").addEventListener("click", async () => {
  const first = document.querySelector("#hasil tr");

  if (!first) {
    alert("Belum ada data");
    return;
  }

  const link = first.cells[1].innerText;
  await navigator.clipboard.writeText(link);

  alert("Disalin: " + link);
});

// ===== EVENT =====
document.getElementById("kirimBtn").addEventListener("click", kirim);

// AUTO LOAD
ambil();
setInterval(ambil, 3000);
</script>

</body>
</html>
