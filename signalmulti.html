<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>P2P Chat WebRTC</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

<style>
body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:15px;
}

h2{
text-align:center;
}

textarea{
width:100%;
height:90px;
margin-top:5px;
border-radius:8px;
padding:8px;
}

#chat{
height:200px;
}

button{
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
background:#2196F3;
color:white;
font-size:14px;
}

.row{
display:flex;
gap:5px;
}

.row button{
flex:1;
}

.status{
background:white;
padding:8px;
border-radius:8px;
margin-bottom:10px;
text-align:center;
}

#qr{
margin-top:10px;
text-align:center;
}

input{
width:70%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.send{
width:28%;
}
</style>
</head>

<body>

<h2>P2P Chat</h2>

<h3>Your Code</h3>

<button onclick="generateCode()">Generate Code</button>

<textarea id="myCode"></textarea>

<div id="qr"></div>

<div class="row">
<button onclick="copyText('myCode')">Copy</button>
<button onclick="pasteText('myCode')">Paste</button>
</div>

<h3>Partner Code</h3>

<textarea id="partnerCode" placeholder="Paste partner code"></textarea>

<div class="row">
<button onclick="pasteText('partnerCode')">Paste</button>
<button onclick="processPartner()">Connect</button>
</div>

<h3>Chat</h3>

<textarea id="chat" readonly></textarea>

<br><br>

<input id="msg" placeholder="Ketik pesan...">
<button class="send" onclick="sendMsg()">Send</button>

<script>

let pc=new RTCPeerConnection({
iceServers:[
{urls:"stun:stun.l.google.com:19302"}
]
});

let channel;

function generateCode(){

channel=pc.createDataChannel("chat");

setupChannel();

pc.createOffer().then(o=>{
pc.setLocalDescription(o);
});

pc.onicecandidate=e=>{
if(!e.candidate){
let code=JSON.stringify(pc.localDescription);
myCode.value=code;
generateQR(code);
}
};

}

function processPartner(){

let data=JSON.parse(partnerCode.value);

if(data.type==="offer"){

pc.setRemoteDescription(data);

pc.ondatachannel=e=>{
channel=e.channel;
setupChannel();
};

pc.createAnswer().then(a=>{
pc.setLocalDescription(a);
});

pc.onicecandidate=e=>{
if(!e.candidate){
let code=JSON.stringify(pc.localDescription);
myCode.value=code;
generateQR(code);
}
};

}

else if(data.type==="answer"){

pc.setRemoteDescription(data);

}

}

function generateQR(text){

document.getElementById("qr").innerHTML="";

QRCode.toCanvas(text,{width:220},function(err,canvas){

if(!err){
document.getElementById("qr").appendChild(canvas);
}

});

}

function setupChannel(){

channel.onopen=()=>{
status.innerText="Connected";
};

channel.onmessage=e=>{
chat.value+="Peer: "+e.data+"\n";
chat.scrollTop=chat.scrollHeight;
};

}

function sendMsg(){

let text=msg.value;

if(text==="")return;

channel.send(text);

chat.value+="Me: "+text+"\n";

msg.value="";

chat.scrollTop=chat.scrollHeight;

}

function copyText(id){

let text=document.getElementById(id);

text.select();

document.execCommand("copy");

alert("Copied");

}

async function pasteText(id){

try{

let text=await navigator.clipboard.readText();

document.getElementById(id).value=text;

}catch{

alert("Paste tidak diizinkan browser");

}

}

</script>

</body>
</html>
