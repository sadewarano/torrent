<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>P2P Chat Room</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:15px;
}

h2{
text-align:center;
}

.status{
background:white;
padding:10px;
border-radius:8px;
text-align:center;
margin-bottom:10px;
}

textarea{
width:100%;
height:120px;
border-radius:8px;
padding:8px;
margin-top:5px;
}

#chat{
height:200px;
}

button{
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
background:#2196F3;
color:white;
}

.row{
display:flex;
gap:5px;
}

.row button{
flex:1;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

</style>

</head>

<body>

<h2>P2P Room Chat</h2>

<div class="status">
Status: <b id="status">Disconnected</b>
</div>

<h3>Room Code</h3>

<input id="room" placeholder="Masukkan Room Code">

<div class="row">
<button onclick="createRoom()">Create Room</button>
<button onclick="joinRoom()">Join Room</button>
</div>

<h3>Your Code</h3>

<textarea id="myCode"></textarea>

<div class="row">
<button onclick="copyCode()">Copy</button>
<button onclick="pasteCode()">Paste</button>
</div>

<h3>Partner Code</h3>

<textarea id="partnerCode"></textarea>

<button onclick="connectPeer()">Connect</button>

<h3>Chat</h3>

<textarea id="chat" readonly></textarea>

<br><br>

<input id="msg" placeholder="Ketik pesan...">
<button onclick="sendMsg()">Send</button>

<script>

let pc;
let channel;

function init(){

pc=new RTCPeerConnection({
iceServers:[
{urls:"stun:stun.l.google.com:19302"}
]
});

pc.ondatachannel=e=>{
channel=e.channel;
setupChannel();
};

}

init();

function createRoom(){

channel=pc.createDataChannel("chat");

setupChannel();

pc.createOffer().then(o=>{
pc.setLocalDescription(o);
});

pc.onicecandidate=e=>{
if(!e.candidate){

let data={
room:room.value,
sdp:pc.localDescription
}

myCode.value=btoa(JSON.stringify(data))

}
};

}

function joinRoom(){

alert("Paste kode dari host lalu klik Connect")

}

function connectPeer(){

let data=JSON.parse(atob(partnerCode.value))

if(data.sdp.type==="offer"){

pc.setRemoteDescription(data.sdp)

pc.createAnswer().then(a=>{
pc.setLocalDescription(a)
})

pc.onicecandidate=e=>{
if(!e.candidate){

let ans={
room:room.value,
sdp:pc.localDescription
}

myCode.value=btoa(JSON.stringify(ans))

}
}

}

else if(data.sdp.type==="answer"){

pc.setRemoteDescription(data.sdp)

}

}

function setupChannel(){

channel.onopen=()=>{
status.innerText="Connected"
}

channel.onmessage=e=>{
chat.value+="Peer: "+e.data+"\n"
chat.scrollTop=chat.scrollHeight
}

}

function sendMsg(){

let text=msg.value

if(text==="")return

channel.send(text)

chat.value+="Me: "+text+"\n"

msg.value=""

chat.scrollTop=chat.scrollHeight

}

function copyCode(){

myCode.select()
document.execCommand("copy")

}

async function pasteCode(){

try{

let text=await navigator.clipboard.readText()
partnerCode.value=text

}catch{

alert("Paste tidak diizinkan")

}

}

</script>

</body>
</html>
