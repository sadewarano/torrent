<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Auto P2P Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/simple-peer@9/simplepeer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bittorrent-tracker@9/client.min.js"></script>

<style>
body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

textarea{
width:100%;
height:200px;
border-radius:8px;
padding:10px;
}

input{
width:70%;
padding:10px;
border-radius:8px;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#2196F3;
color:white;
}

.status{
background:white;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}
</style>
</head>

<body>

<h2>Auto P2P Chat</h2>

<div class="status">
Status: <b id="status">Searching peer...</b>
</div>

<textarea id="chat" readonly></textarea>

<br><br>

<input id="msg">
<button onclick="send()">Send</button>

<script>

let peer;

const infoHash="12345678901234567890";

const client=new window.BittorrentTracker({
infoHash:infoHash,
peerId:crypto.randomUUID().slice(0,20),
announce:[
"wss://tracker.openwebtorrent.com",
"wss://tracker.btorrent.xyz"
]
});

client.start();

client.on("peer",(addr)=>{

status.innerText="Peer found, connecting...";

peer=new SimplePeer({
initiator:Math.random()>0.5,
trickle:false
});

peer.on("connect",()=>{
status.innerText="Connected";
});

peer.on("data",(data)=>{
chat.value+="Peer: "+data+"\n";
chat.scrollTop=chat.scrollHeight;
});

});

function send(){

let text=msg.value;

if(!peer || !peer.connected) return;

peer.send(text);

chat.value+="Me: "+text+"\n";

msg.value="";

}

</script>

</body>
</html>
