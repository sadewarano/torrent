<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WebTorrent Auto Seeder P2P Rarest + PieceMap v3</title>
<script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
<style>
body{font-family:system-ui;padding:16px;max-width:700px;margin:auto;background:#f5f5f5}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;box-sizing:border-box}
button{border:none;color:#fff;font-weight:600;cursor:pointer}
.btn-copy{background:#2196F3}
.btn-force{background:#f59e0b}
.card{background:#fff;padding:12px;border-radius:8px;margin:10px 0}
.torrent{border-left:4px solid #ccc;padding:8px;margin:8px 0;background:#fafafa}
.torrent.active{border-left:4px solid #f59e0b}
.torrent.done{border-left:4px solid #4CAF50}
.torrent.prog{font-size:0.85em;color:#555}
.peer-detail{font-size:0.75em;color:#666;margin-top:4px}
.row{display:flex;gap:8px}
.row button{width:50%}
.badge{font-size:0.7em;background:#6366f1;color:#fff;padding:2px 6px;border-radius:4px}

/* PIECE MAP */
.piecemap{margin-top:8px}
.piecemap-title{font-size:0.8em;font-weight:600;margin-bottom:4px}
.pieces{display:flex;flex-wrap:wrap;gap:1px}
.piece{width:8px;height:8px;background:#e0e0e0;border-radius:1px} /* 1. ABU = Belum punya */
.piece.have{background:#4CAF50} /* 3. IJO = Sudah punya/Seeder */
.piece.downloading{background:#f59e0b;animation:blink 1s infinite} /* 2. KUNING KEDIP = Lagi download */
@keyframes blink{50%{opacity:0.3}}
.legend{display:flex;gap:10px;font-size:0.7em;margin-top:4px}
.legend span{display:flex;align-items:center;gap:4px}
.legend i{width:8px;height:8px;border-radius:1px;display:inline-block}
</style></head><body>
<h2>🌱 WebTorrent Auto Seeder P2P + RAREST v3</h2>

<input id="magnet" placeholder="Tempel magnet / hash BTIH manual">
<button class="btn-copy" onclick="addManual()">➕ Tambah & Download/Seed</button>

<div class="card" id="info">ℹ️ Menunggu magnet baru dari GAS...</div>
<div class="card">Torrent Aktif: <span id="count">0</span>/5 | Mode: <span class="badge">RAREST</span></div>

<div class="card">
<h3>🌐 Daftar Torrent Aktif Max 5</h3>
<div id="listSeeder"></div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbwCi-pP169wRNLiieaXqn_hfejzSEm2HGGk0EpL2krYTmKkz6ky1_WoBsVcw3F3YxJoBg/exec";
const MAX_SEEDER = 5;
const CEK_INTERVAL = 2000;
const TRACKERS = [
  "wss://tracker.openwebtorrent.com",
  "wss://tracker.btorrent.xyz",
  "wss://tracker.webtorrent.dev",
  "wss://tracker.fastcast.nz"
];
const client=new WebTorrent();
let seeders = {};
let seenHashes = new Set();

function log(t){document.getElementById('info').textContent=t}
function extractHash(v){let m=v.match(/btih:([a-f0-9]{40})/i);if(m)return m[1].toLowerCase();if(/^[a-f0-9]{40}$/i.test(v))return v.toLowerCase();return null;}
function buildMagnet(h){let m='magnet:?xt=urn:btih:'+h; TRACKERS.forEach(tr=>m+="&tr="+encodeURIComponent(tr)); return m;}

function addManual(){
  let h = extractHash(magnet.value.trim());
  if(!h){alert("Hash tidak valid");return;}
  addTorrent(h, "Manual");
}

function addTorrent(hash, sumber="GAS"){
  if(seeders){log("ℹ️ "+hash.substring(0,8)+"... sudah aktif");return;}
  if(Object.keys(seeders).length >= MAX_SEEDER){
    let firstHash = Object.keys(seeders)[0];
    seeders[firstHash].destroy();
    delete seeders[firstHash];
    log("🗑️ Hapus torrent lama: "+firstHash.substring(0,8)+"...");
  }

  client.add(buildMagnet(hash), {announce: TRACKERS, maxConns: 80}, t=>{
    seeders = t;
    seenHashes.add(hash);
    updateUI();
    log(`⬇️ ${sumber} Join swarm: ${hash.substring(0,8)}...`);

    t.on("download", ()=> updateUI());
    t.on("upload", ()=> updateUI());
    t.on("wire", ()=> updateUI());
    t.on("metadata", ()=> updateUI());
    t.on("done", ()=>{log(`✅ ${hash.substring(0,8)}... 100%. Mode Seeder`); updateUI();});
    t.on("error", e => {log("❌ Error: " + e.message);});
  });
}

function forceAnnounce(hash){
  let t = seeders;
  if(!t) return;
  log("🔄 Force announce ke tracker...");
  t.discover();
  setTimeout(()=>log("✅ Force selesai. Tunggu 5-10 detik"), 1000);
}

/* RENDER PIECE MAP V3 - LOGIKA WARNA BARU */
function renderPieceMap(t){
  if(!t.pieces) return '<div class="piecemap-title">Piece Map: Loading metadata...</div>';

  let downloadingPieces = new Set();
  try {
    if(t._selections){
        t._selections.forEach(sel=>{
            for(let i=sel.from; i<=sel.to; i++) downloadingPieces.add(i);
        })
    }
  } catch(e){}

  let html = `<div class="piecemap"><div class="piecemap-title">Piece Map: ${t.pieces.length} pieces</div><div class="pieces">`;

  for(let i=0; i<t.pieces.length; i++){
    let cls = "piece"; // Default = ABU

    // PRIORITAS 1: Kalau sudah punya = IJO. Ini paling penting
    if(t.pieces[i]) {
      cls = "piece have";
    }
    // PRIORITAS 2: Kalau lagi di-request = KUNING. Tapi hanya kalau belum punya
    else if(downloadingPieces.has(i)) {
      cls = "piece downloading";
    }
    // PRIORITAS 3: Sisanya tetap ABU

    html += `<div class="${cls}" title="Piece ${i}"></div>`;
  }
  html += `</div>
    <div class="legend">
        <span><i style="background:#4CAF50"></i> Punya/Seeder</span>
        <span><i style="background:#f59e0b"></i> Download</span>
        <span><i style="background:#e0e0e0"></i> Belum</span>
    </div>
  </div>`;
  return html;
}

function updateUI(){
  document.getElementById('count').textContent = Object.keys(seeders).length;
  let listEl = document.getElementById('listSeeder');
  listEl.innerHTML = "";
  if(Object.keys(seeders).length === 0){listEl.innerHTML = "Belum ada torrent";return;}

  Object.keys(seeders).forEach(hash=>{
    let t = seeders;
    let div = document.createElement("div");
    let status = t.progress < 1? "Downloading" : "Seeding";
    div.className = "torrent " + (t.progress < 1? "active" : "done");

    let prog = Math.round(t.progress*100);
    let peers = t.numPeers;
    let up = formatBytes(t.uploaded);
    let down = formatBytes(t.downloaded);
    let name = t.name || hash.substring(0,16)+"...";

    let peerHtml = "";
    t.wires.forEach((wire, i)=>{
      let pProg = Math.round(wire.peerProgress * 100);
      peerHtml += `<div class="peer-detail">Peer ${i+1}: ${pProg}% - ↑${formatBytes(wire.uploaded)} ↓${formatBytes(wire.downloaded)}</div>`;
    })

    div.innerHTML = `
      <b>${name}</b><br>
      <div class="prog">Status: ${status} | ${prog}% | Peer: ${peers} | ↑${up} ↓${down}</div>
      ${renderPieceMap(t)}
      ${peerHtml}
      <div class="row">
        <button onclick="forceAnnounce('${hash}')" class="btn-force">⚡ Force Announce</button>
        <button onclick="copy('${hash}')" class="btn-copy">📋 Copy</button>
      </div>
      <button onclick="remove('${hash}')" style="background:#f44336">❌ Stop</button>
    `;
    listEl.appendChild(div);
  });
}

function formatBytes(b){if(b===0)return '0B';const k=1024;const sizes=['B','KB','MB','GB'];const i=Math.floor(Math.log(b)/Math.log(k));return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+sizes[i];}
function copy(hash){navigator.clipboard.writeText(buildMagnet(hash));log("📋 Disalin");}
function remove(hash){if(seeders){seeders.destroy();delete seeders;updateUI();log("❌ Torrent di-stop");}}

async function cekGAS(){
  try{
    const res=await fetch(API+"?t="+Date.now(), {cache: "no-store"});
    const data=await res.json();
    let semuaKode = [];
    if(Array.isArray(data)){ data.forEach(d => { if(d.kode) semuaKode.push(d.kode) }); }
    else if(data&&data.kode){ semuaKode.push(data.kode); }
    if(semuaKode.length === 0) return;

    let arr = [...new Set(semuaKode.join(",").split(",").filter(Boolean).map(extractHash).filter(Boolean))];

    let newFound = false;
    arr.forEach(hash=>{
      if(!seenHashes.has(hash) &&!seeders){
        addTorrent(hash, "GAS");
        newFound = true;
      }
    });
    if(newFound) log("🆕 Magnet baru terdeteksi dari GAS. Auto join swarm...");

  }catch(e){log("❌ GAS Error: "+e.message)}
}

cekGAS();
setInterval(cekGAS, CEK_INTERVAL);
setInterval(updateUI, 1500);
</script></body></html>
