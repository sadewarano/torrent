<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WebTorrent Auto GAS</title>
<script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
<style>
body{font-family:system-ui;padding:16px;max-width:600px;margin:auto;background:#f5f5f5}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;box-sizing:border-box}
button{border:none;color:#fff;font-weight:600;cursor:pointer}
.btn-copy{background:#2196F3}
.btn-force{background:#f59e0b}
.card{background:#fff;padding:12px;border-radius:8px;margin:10px 0}
.torrent{border-left:4px solid #ccc;padding:8px;margin:8px 0;background:#fafafa}
.torrent.active{border-left:4px solid #f59e0b}
.torrent.done{border-left:4px solid #4CAF50}
.torrent.prog{font-size:0.85em;color:#555}
.peer-detail{font-size:0.75em;color:#666;margin-top:4px}
.row{display:flex;gap:8px}
.row button{width:33%}
.badge{font-size:0.7em;background:#22c55e;color:#fff;padding:2px 6px;border-radius:4px}
.log{font-size:0.8em;color:#444;background:#f0f0f0;padding:6px;border-radius:4px;margin-top:4px;max-height:100px;overflow:auto}
</style></head><body>
<h2>🌱 WebTorrent Auto GAS</h2>

<input id="magnet" placeholder="Tempel magnet / hash BTIH manual">
<button class="btn-copy" onclick="addManual()">➕ Tambah Manual</button>

<div class="card" id="info">ℹ️ Status: Idle</div>
<div class="card">Torrent Aktif: <span id="count">0</span>/5 | Auto-Force: <span id="autoStatus">OFF</span></div>

<div class="card">
<h3>🌐 Daftar Torrent Aktif Max 5</h3>
<div id="listSeeder"></div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbwCi-pP169wRNLiieaXqn_hfejzSEm2HGGk0EpL2krYTmKkz6ky1_WoBsVcw3F3YxJoBg/exec";
const MAX_SEEDER = 5;
const AUTO_FORCE_INTERVAL = 5000;
const TRACKERS = [
  "wss://tracker.openwebtorrent.com",
  "wss://tracker.btorrent.xyz",
  "wss://tracker.webtorrent.dev",
  "wss://tracker.fastcast.nz"
];

const client=new WebTorrent();
let seeders = {}; // {hash: torrent}
let knownHashes = new Set(); // buat cek magnet baru
let autoForceTimer = null;

function log(t){
  document.getElementById('info').textContent = t;
  console.log(t);
}

function extractHash(v){
  let m=v.match(/btih:([a-f0-9]{40})/i);
  if(m)return m[1].toLowerCase();
  if(/^[a-f0-9]{40}$/i.test(v))return v.toLowerCase();
  return null;
}

function buildMagnet(h){
  let m='magnet:?xt=urn:btih:'+h;
  TRACKERS.forEach(tr=>m+="&tr="+encodeURIComponent(tr));
  return m;
}

/* TAMBAH MANUAL */
function addManual(){
  let h = extractHash(magnet.value.trim());
  if(!h){alert("Hash tidak valid");return;}
  addTorrent(h, "Manual");
}

/* FUNGSI UTAMA: TAMBAH TORRENT */
function addTorrent(hash, sumber="GAS"){
  if(seeders){
    log("ℹ️ Skip: "+hash.substring(0,8)+"... sudah aktif");
    return;
  }
  if(knownHashes.has(hash)) return; // jaga2 dobel

  if(Object.keys(seeders).length >= MAX_SEEDER){
    let firstHash = Object.keys(seeders)[0];
    seeders[firstHash].destroy();
    delete seeders[firstHash];
    knownHashes.delete(firstHash);
    log("🗑️ Hapus torrent lama: "+firstHash.substring(0,8)+"...");
  }

  knownHashes.add(hash);
  log(`⬇️ ${sumber}: Menambah ${hash.substring(0,8)}...`);

  client.add(buildMagnet(hash), {
    strategy: 'rarest',
    maxConns: 55,
    announce: TRACKERS // langsung kasih tracker
  }, t=>{
    seeders = t;
    updateUI();
    startAutoForce();

    t.on("download", ()=> updateUI());
    t.on("upload", ()=> updateUI());
    t.on("wire", ()=> updateUI());

    t.on("done", ()=>{
      log(`✅ ${hash.substring(0,8)}... 100% SEEDING`);
      updateUI();
    });
    t.on("error", e => log("❌ Error: " + e.message));
  });
}

/* AUTO FORCE */
function startAutoForce(){
  if(autoForceTimer) return;
  document.getElementById('autoStatus').textContent = "ON";
  autoForceTimer = setInterval(()=>{
    Object.values(seeders).forEach(t=>{
      if(t && t.numPeers < 20) t.discover();
    });
  }, AUTO_FORCE_INTERVAL);
}

function stopAutoForce(){
  if(Object.keys(seeders).length === 0){
    clearInterval(autoForceTimer);
    autoForceTimer = null;
    document.getElementById('autoStatus').textContent = "OFF";
  }
}

function forceAnnounce(hash){
  let t = seeders;
  if(!t) return;
  log("⚡ Force: "+hash.substring(0,8));
  t.discover();
}

/* UPDATE UI */
function updateUI(){
  document.getElementById('count').textContent = Object.keys(seeders).length;
  let html = "";
  Object.keys(seeders).forEach(hash=>{
    let t = seeders;
    let status = t.progress < 1? "Downloading" : "Seeding";
    let prog = Math.round(t.progress*100);
    let peers = t.numPeers;
    let up = formatBytes(t.uploaded);
    let down = formatBytes(t.downloaded);

    let peerHtml = "";
    t.wires.forEach((wire, i)=>{
      let pProg = Math.round(wire.peerProgress * 100);
      peerHtml += `<div class="peer-detail">Peer ${i+1}: ${pProg}%</div>`;
    })

    html += `
      <div class="torrent ${t.progress < 1? 'active' : 'done'}">
        <b>${hash.substring(0,16)}...</b> ${peers>0?'<span class="badge">P2P</span>':''}<br>
        <div class="prog">${status} | ${prog}% | Peer: ${peers} | ↑${up} ↓${down}</div>
        ${peerHtml}
        <div class="row">
          <button onclick="forceAnnounce('${hash}')" class="btn-force">⚡ Force</button>
          <button onclick="copy('${hash}')" class="btn-copy">📋 Copy</button>
          <button onclick="remove('${hash}')" style="background:#f44336">❌ Stop</button>
        </div>
      </div>
    `;
  });
  document.getElementById('listSeeder').innerHTML = html || '<div class="log">Belum ada torrent</div>';
  stopAutoForce();
}

function formatBytes(b){if(b===0)return '0B';const k=1024;const sizes=['B','KB','MB','GB'];const i=Math.floor(Math.log(b)/Math.log(k));return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+sizes[i];}
function copy(hash){navigator.clipboard.writeText(buildMagnet(hash));log("📋 Disalin");}

function remove(hash){
  if(seeders){
    seeders.destroy();
    delete seeders;
    knownHashes.delete(hash);
    updateUI();
    log("❌ Stop: "+hash.substring(0,8));
  }
}

/* CEK GAS TIAP 3 DETIK - VERSI FIX */
let lastKode = "";
async function cekGAS(){
  try{
    const res=await fetch(API+"?t="+Date.now());
    const data=await res.json();
    let kode="";
    if(Array.isArray(data)&&data.length){kode=data[data.length-1].kode||"";}
    else if(data&&data.kode){kode=data.kode;}
    if(!kode || kode === lastKode) return; // skip kalau sama

    lastKode = kode;
    let arr = kode.split(",").filter(Boolean).map(extractHash).filter(Boolean);
    arr = [...new Set(arr)]; // hapus duplikat

    // CARI YANG BARU
    let newHashes = arr.filter(h =>!knownHashes.has(h));

    if(newHashes.length > 0){
      log(`🆕 Ditemukan ${newHashes.length} magnet baru dari GAS`);
      newHashes.forEach((hash, i)=>{
        setTimeout(()=>addTorrent(hash, "GAS"), i * 1000); // jeda 1 detik biar gak bentrok
      });
    }
  }catch(e){log("❌ GAS Error: "+e.message)}
}

cekGAS();
setInterval(cekGAS, 3000);
</script></body></html>
