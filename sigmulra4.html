<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>P2P Multi Chat Broadcast</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  font-family:Arial;
  background:#e5ddd5;
  margin:0;
  display:flex;
  flex-direction:column;
  height:100vh;
}
header{
  background:#075E54;
  color:white;
  padding:12px;
  text-align:center;
  font-weight:bold;
}
.status{
  background:white;
  padding:8px;
  text-align:center;
  font-size:14px;
  border-bottom:1px solid #ddd;
}
.controls{
  background:white;
  padding:10px;
  border-bottom:1px solid #ddd;
}
textarea{
  width:100%;
  height:70px;
  border-radius:6px;
  border:1px solid #ccc;
  padding:6px;
  margin-top:5px;
}
button{
  background:#128C7E;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  margin-top:5px;
}
.row{
  display:flex;
  gap:5px;
}
.chat, .broadcast{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
  border-top:1px solid #ddd;
  background:#f9f9f9;
}
.msg{
  max-width:70%;
  padding:8px 10px;
  border-radius:10px;
  font-size:14px;
  word-wrap:break-word;
}
.me{align-self:flex-end;background:#dcf8c6;}
.peer{align-self:flex-start;background:white;}

.inputBar{
  display:flex;
  background:white;
  padding:8px;
  gap:5px;
  border-top:1px solid #ddd;
}
.inputBar input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}
.send{
  background:#128C7E;
  border:none;
  color:white;
  padding:10px 16px;
  border-radius:20px;
}
</style>
</head>
<body>

<header>P2P Multi Chat Broadcast</header>

<div class="status">Peers connected: <b id="count">0</b></div>

<div class="controls">
<button onclick="createOffer()">Generate Offer</button>
<textarea id="myCode" placeholder="Your code"></textarea>
<div class="row">
<button onclick="copyText('myCode')">Copy</button>
</div>
<textarea id="partnerCode" placeholder="Partner code"></textarea>
<div class="row">
<button onclick="pasteText('partnerCode')">Paste</button>
<button onclick="processCode()">Connect</button>
</div>
</div>

<div id="chat" class="chat"></div>

<div class="inputBar">
<input id="msg" placeholder="Type message...">
<button class="send" onclick="sendMsg()">Send</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<script>
function uid(){
  return "p"+Date.now()+Math.floor(Math.random()*10000)
}
const myUser="User"+uid();
let peers={}, channels={}, seenMsgs=new Set();
let knownPeers = {};

function getId(code){
  return code.match(/^p\d+/)[0]
}


function newPeer(id){
  let pc=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
  pc.ondatachannel=e=>{
    channels[id]=e.channel;
    setupChannel(id);
  };
  peers[id]=pc;
  return pc;
}

function createOffer(){
  let id=uid();
  let pc=newPeer(id);
  let ch=pc.createDataChannel("chat");
  channels[id]=ch;
  setupChannel(id);
  pc.createOffer().then(o=>pc.setLocalDescription(o));
  pc.onicecandidate=e=>{
    if(!e.candidate){
      let s=LZString.compressToEncodedURIComponent(pc.localDescription.sdp);
      myCode.value=id+"o"+s;
      knownPeers[id] = myCode.value; // tambah ini
    }
  };
}

function processCode(){
let code=partnerCode.value.trim()
if(!code)return
let id=getId(code)
if(id===getId(myCode.value||""))return
if(peers[id])return
let type=code[id.length]
let data=code.slice(id.length+1)
let sdp=LZString.decompressFromEncodedURIComponent(data)
let pc=newPeer(id)
knownPeers[id]=code
if(type==="o"){
pc.setRemoteDescription({type:"offer",sdp:sdp})
pc.createAnswer().then(a=>pc.setLocalDescription(a))
pc.onicecandidate=e=>{
if(!e.candidate){
let s=LZString.compressToEncodedURIComponent(pc.localDescription.sdp)
let answer=id+"a"+s
myCode.value=answer
knownPeers[id]=answer
}}
}
else if(type==="a"){
pc.setRemoteDescription({type:"answer",sdp:sdp})
}
}

function setupChannel(id){
  channels[id].onopen = () => {
    updateCount()
    // kirim semua peer yang diketahui
    for(let pid in knownPeers){
      if(pid !== id){
        channels[id].send(JSON.stringify({
          type:"peer",
          code: knownPeers[pid]
        }))
      }
    }
    // kirim code diri sendiri
    if(myCode.value){
      channels[id].send(JSON.stringify({
        type:"peer",
        code: myCode.value
      }))
    }
  }

  channels[id].onmessage = (e) => {
    let data
    try{
      data = JSON.parse(e.data)
    }catch{
      return
    }
    if(data.type==="peer"){
      let pid = getId(data.code)
      if(!knownPeers[pid]){
        knownPeers[pid] = data.code
      }
      if(!peers[pid]){
        partnerCode.value = data.code
        processCode()
      }
      return
    }
    broadcastMessage(data,id)
  }
  channels[id].onclose = () => {
    delete peers[id]
    delete channels[id]
    updateCount()
  }
}

function sendMsg(){
  let text = msg.value.trim();
  if(!text) return;
  let msgObj={
    id:uid(),
    text:text,
    sender:myUser
  };
  broadcastMessage(msgObj);
  msg.value="";
}

function addMessage(text,isMe){
  let div=document.createElement("div");
  div.className="msg "+(isMe?"me":"peer");
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function broadcastMessage(msgObj,idFrom=null){
  if(seenMsgs.has(msgObj.id)) return;
  seenMsgs.add(msgObj.id);
  // relay ke peer lain
  for(let id in channels){
    if(id!==idFrom && channels[id].readyState==="open"){
      channels[id].send(JSON.stringify(msgObj));
    }
  }
  let div=document.createElement("div");
  // posisi bubble
  if(msgObj.sender===myUser){
    div.className="msg me";
  }else{
    div.className="msg peer";
  }
  div.innerText=msgObj.sender+" : "+msgObj.text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function updateCount(){
  let n=0;
  for(let id in channels) if(channels[id].readyState==="open") n++;
  count.innerText=n;
}

function copyText(id){let t=document.getElementById(id); t.select(); document.execCommand("copy");}
async function pasteText(id){let text=await navigator.clipboard.readText(); document.getElementById(id).value=text;}

msg.addEventListener("keypress",e=>{
  if(e.key==="Enter"){e.preventDefault(); sendMsg();}
});
setInterval(()=>{
  gossipPeers()
  // reconnect peer yang belum tersambung
  for(let pid in knownPeers){
    if(!peers[pid]){
      partnerCode.value = knownPeers[pid]
      processCode()
    }
  }
},5000)

function gossipPeers(){
for(let id in channels){
if(channels[id].readyState==="open"){
for(let pid in knownPeers){
if(pid!==id){
channels[id].send(JSON.stringify({type:"peer",code:knownPeers[pid]}))
}}
}}
}

</script>
</body>
</html>
