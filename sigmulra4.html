<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>P2P Mesh Chat Tree</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  font-family:Arial;
  background:#e5ddd5;
  margin:0;
  display:flex;
  flex-direction:column;
  height:100vh;
}
header{
  background:#075E54;
  color:white;
  padding:12px;
  text-align:center;
  font-weight:bold;
}
.status{
  background:white;
  padding:8px;
  text-align:center;
  font-size:14px;
  border-bottom:1px solid #ddd;
}
.controls{
  background:white;
  padding:10px;
  border-bottom:1px solid #ddd;
}
textarea{
  width:100%;
  height:70px;
  border-radius:6px;
  border:1px solid #ccc;
  padding:6px;
  margin-top:5px;
}
button{
  background:#128C7E;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  margin-top:5px;
}
.row{
  display:flex;
  gap:5px;
}
.chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
  border-top:1px solid #ddd;
  background:#f9f9f9;
}
.msg{
  max-width:70%;
  padding:8px 10px;
  border-radius:10px;
  font-size:14px;
  word-wrap:break-word;
}
.me{align-self:flex-end;background:#dcf8c6;}
.peer{align-self:flex-start;background:white;}
.inputBar{
  display:flex;
  background:white;
  padding:8px;
  gap:5px;
  border-top:1px solid #ddd;
}
.inputBar input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}
.send{
  background:#128C7E;
  border:none;
  color:white;
  padding:10px 16px;
  border-radius:20px;
}
.networkTree{
  background:#fff;
  border-top:1px solid #ddd;
  padding:8px;
  font-family:monospace;
  font-size:13px;
  max-height:150px;
  overflow:auto;
}
</style>
</head>
<body>

<header>P2P Mesh Chat Tree</header>

<div class="status">Peers connected: <b id="count">0</b></div>

<div class="controls">
<textarea id="codeBox" placeholder="Paste Offer/Answer here"></textarea>
<div class="row">
<button onclick="copyText('codeBox')">Copy</button>
<button onclick="processCode()">Connect</button>
</div>
</div>

<div id="chat" class="chat"></div>

<div class="inputBar">
<input id="msg" placeholder="Type message...">
<button class="send" onclick="sendMsg()">Send</button>
</div>

<div class="networkTree" id="tree"></div>

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<script>
const myUser="User"+uid();
let peers={}, channels={}, seenMsgs=new Set();
let knownPeers={}; // untuk topologi
function uid(){return "p"+Date.now()+Math.floor(Math.random()*10000)}

function newPeer(id){
  let pc=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
  pc.ondatachannel=e=>{
    channels[id]=e.channel;
    setupChannel(id);
  };
  peers[id]=pc;
  return pc;
}

function createOffer(){
  let id=uid();
  let pc=newPeer(id);
  let ch=pc.createDataChannel("chat");
  channels[id]=ch;
  setupChannel(id);
  pc.createOffer().then(o=>pc.setLocalDescription(o));
  pc.onicecandidate=e=>{
    if(!e.candidate){
      let s=LZString.compressToEncodedURIComponent(pc.localDescription.sdp);
      codeBox.value=id+"o"+s;
    }
  };
}

function processCode(){
  let code=codeBox.value.trim();
  let id=code.match(/^p\d+/)[0];
  let type=code[id.length];
  let data=code.slice(id.length+1);
  let sdp=LZString.decompressFromEncodedURIComponent(data);
  let pc=peers[id] || newPeer(id);
  knownPeers[id]=knownPeers[id]||[];
  
  if(type==="o"){
    pc.setRemoteDescription({type:"offer",sdp:sdp});
    pc.createAnswer().then(a=>pc.setLocalDescription(a));
    pc.onicecandidate=e=>{
      if(!e.candidate){
        let s=LZString.compressToEncodedURIComponent(pc.localDescription.sdp);
        codeBox.value=id+"a"+s;
      }
    };
  } else if(type==="a"){
    pc.setRemoteDescription({type:"answer",sdp:sdp});
  }
}

function setupChannel(id){
  channels[id].onopen=()=>{
    updateCount();
    broadcastTopology();
  };
  channels[id].onmessage=(e)=>{
    let msgObj;
    try{msgObj=JSON.parse(e.data);}catch{
      msgObj={id:uid(),text:e.data,sender:id};
    }
    if(msgObj.type==="topology"){
      knownPeers[msgObj.user]=msgObj.peers;
      updateTree();
      return;
    }
    broadcastMessage(msgObj,id);
  };
  channels[id].onclose=()=>{
    updateCount();
    delete knownPeers[id];
    updateTree();
  };
}

function sendMsg(){
  let text=msg.value.trim();
  if(!text) return;
  let msgObj={id:uid(),text:text,sender:myUser};
  broadcastMessage(msgObj);
  msg.value="";
}

function broadcastMessage(msgObj,idFrom=null){
  if(seenMsgs.has(msgObj.id)) return;
  seenMsgs.add(msgObj.id);
  for(let id in channels){
    if(id!==idFrom && channels[id].readyState==="open"){
      channels[id].send(JSON.stringify(msgObj));
    }
  }
  let div=document.createElement("div");
  div.className=msgObj.sender===myUser?"msg me":"msg peer";
  div.innerText=msgObj.sender+" : "+msgObj.text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function updateCount(){
  let n=0;
  for(let id in channels) if(channels[id].readyState==="open") n++;
  count.innerText=n;
}

function copyText(id){let t=document.getElementById(id); t.select(); document.execCommand("copy");}
async function pasteText(id){let text=await navigator.clipboard.readText(); document.getElementById(id).value=text;}

msg.addEventListener("keypress",e=>{
  if(e.key==="Enter"){e.preventDefault(); sendMsg();}
});

// --- TREE NETWORK FUNCTIONS ---
function broadcastTopology(){
  let peersList=Object.keys(channels).filter(id=>channels[id].readyState==="open");
  let topo={type:"topology",user:myUser,peers:peersList};
  for(let id in channels){
    if(channels[id].readyState==="open") channels[id].send(JSON.stringify(topo));
  }
  knownPeers[myUser]=peersList;
  updateTree();
}

function updateTree(){
  let treeStr=myUser+"\n";
  let visited=new Set();
  function build(user,prefix){
    if(!knownPeers[user]) return;
    visited.add(user);
    knownPeers[user].forEach(p=>{
      if(visited.has(p)) return;
      treeStr+=prefix+"└─ "+p+"\n";
      build(p,prefix+"   ");
    });
  }
  build(myUser,"");
  tree.innerText=treeStr;
}

// auto-broadcast topology
setInterval(()=>{
  broadcastTopology();
},5000);

</script>
</body>
</html>
