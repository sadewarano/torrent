<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>P2P Multi Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;background:#f2f2f2;padding:15px}
textarea{width:100%;height:90px;margin-top:5px;border-radius:8px;padding:8px}
#chat{height:220px}
button{padding:10px;border:none;border-radius:8px;background:#2196F3;color:white;margin-top:5px}
.row{display:flex;gap:5px}
.status{background:white;padding:8px;border-radius:8px;margin-bottom:10px;text-align:center}
input{width:70%;padding:10px;border-radius:8px;border:1px solid #ccc}
.send{width:28%}
</style>

</head>

<body>

<h2>P2P Multi User Chat</h2>

<div class="status">
Peers connected: <b id="count">0</b>
</div>

<h3>Your Code</h3>

<button onclick="createOffer()">Generate Offer</button>

<textarea id="myCode"></textarea>

<div class="row">
<button onclick="copyText('myCode')">Copy</button>
</div>

<h3>Partner Code</h3>

<textarea id="partnerCode"></textarea>

<div class="row">
<button onclick="pasteText('partnerCode')">Paste</button>
<button onclick="processCode()">Process</button>
</div>

<h3>Chat</h3>

<textarea id="chat" readonly></textarea>

<br><br>

<input id="msg" placeholder="message">
<button class="send" onclick="sendMsg()">Send</button>

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>

<script>

let peers={}
let channels={}

function uid(){
return "p"+Date.now()+Math.floor(Math.random()*10000)
}

function newPeer(id){

let pc=new RTCPeerConnection({
iceServers:[{urls:"stun:stun.l.google.com:19302"}]
})

pc.ondatachannel=e=>{
channels[id]=e.channel
setupChannel(id)
}

peers[id]=pc

return pc

}

function createOffer(){

let id=uid()

let pc=newPeer(id)

let ch=pc.createDataChannel("chat")
channels[id]=ch

setupChannel(id)

pc.createOffer().then(o=>pc.setLocalDescription(o))

pc.onicecandidate=e=>{
if(!e.candidate){

let s=LZString.compressToEncodedURIComponent(pc.localDescription.sdp)

myCode.value=id+"o"+s

}
}

}

function processCode(){

let code=partnerCode.value.trim()

let id=code.match(/^p\d+/)[0]

let type=code[id.length]

let data=code.slice(id.length+1)

let sdp=LZString.decompressFromEncodedURIComponent(data)

let pc=peers[id] || newPeer(id)

if(type==="o"){

pc.setRemoteDescription({type:"offer",sdp:sdp})

pc.createAnswer().then(a=>pc.setLocalDescription(a))

pc.onicecandidate=e=>{
if(!e.candidate){

let s=LZString.compressToEncodedURIComponent(pc.localDescription.sdp)

myCode.value=id+"a"+s

}
}

}

else if(type==="a"){

pc.setRemoteDescription({type:"answer",sdp:sdp})

}

}

function setupChannel(id){

channels[id].onopen=()=>{
updateCount()
}

channels[id].onmessage=e=>{

chat.value+="Peer: "+e.data+"\n"

chat.scrollTop=chat.scrollHeight

}

channels[id].onclose=()=>{
updateCount()
}

}

function sendMsg(){

let text=msg.value

if(!text)return

for(let id in channels){

let ch=channels[id]

if(ch.readyState==="open"){
ch.send(text)
}

}

chat.value+="Me: "+text+"\n"

msg.value=""

chat.scrollTop=chat.scrollHeight

}

function updateCount(){

let n=0

for(let id in channels){
if(channels[id].readyState==="open") n++
}

count.innerText=n

}

function copyText(id){

let t=document.getElementById(id)

t.select()

document.execCommand("copy")

}

async function pasteText(id){

let text=await navigator.clipboard.readText()

document.getElementById(id).value=text

}

</script>

</body>
</html>
