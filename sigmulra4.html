<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Distributed Mesh Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#e5ddd5;
margin:0;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#075E54;
color:white;
padding:12px;
text-align:center;
font-weight:bold;
}

.status{
background:white;
padding:8px;
text-align:center;
font-size:14px;
border-bottom:1px solid #ddd;
}

.controls{
background:white;
padding:10px;
border-bottom:1px solid #ddd;
}

textarea{
width:100%;
height:70px;
border-radius:6px;
border:1px solid #ccc;
padding:6px;
margin-top:5px;
}

button{
background:#128C7E;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
margin-top:5px;
}

.row{
display:flex;
gap:5px;
}

.chat{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
background:#f9f9f9;
}

.msg{
max-width:70%;
padding:8px 10px;
border-radius:10px;
font-size:14px;
word-wrap:break-word;
}

.me{
align-self:flex-end;
background:#dcf8c6;
}

.peer{
align-self:flex-start;
background:white;
}

.inputBar{
display:flex;
background:white;
padding:8px;
gap:5px;
border-top:1px solid #ddd;
}

.inputBar input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

.send{
background:#128C7E;
border:none;
color:white;
padding:10px 16px;
border-radius:20px;
}
</style>
</head>

<body>

<header>Distributed Mesh Chat</header>

<div class="status">
Peers connected : <b id="count">0</b>
</div>

<div class="controls">

<button onclick="createOffer()">Generate Offer</button>

<textarea id="myCode" placeholder="Your code"></textarea>

<div class="row">
<button onclick="copyText('myCode')">Copy</button>
</div>

<textarea id="partnerCode" placeholder="Partner code"></textarea>

<div class="row">
<button onclick="pasteText('partnerCode')">Paste</button>
<button onclick="processCode()">Connect</button>
</div>

</div>

<div id="chat" class="chat"></div>

<div class="inputBar">
<input id="msg" placeholder="Type message...">
<button class="send" onclick="sendMsg()">Send</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>

<script>

function uid(){
return "p"+Date.now()+Math.floor(Math.random()*10000)
}

const myId=uid()
const myUser="User"+myId.slice(-5)

let peers={}
let channels={}
let knownPeers={}
let seenMsgs=new Set()

function getId(code){
return code.match(/^p\d+/)[0]
}

function newPeer(id){

let pc=new RTCPeerConnection({
iceServers:[{urls:"stun:stun.l.google.com:19302"}]
})

pc.ondatachannel=e=>{
channels[id]=e.channel
setupChannel(id)
}

peers[id]=pc

return pc
}

function createOffer(){

let id=myId

let pc=newPeer(id)

let ch=pc.createDataChannel("chat")

channels[id]=ch

setupChannel(id)

pc.createOffer().then(o=>pc.setLocalDescription(o))

pc.onicecandidate=e=>{
if(!e.candidate){

let s=LZString.compressToEncodedURIComponent(pc.localDescription.sdp)

myCode.value=id+"o"+s

knownPeers[id]=myCode.value

}
}

}

function processCode(){

let code=partnerCode.value.trim()

if(!code)return

let id=getId(code)

let type=code[id.length]

let data=code.slice(id.length+1)

let sdp=LZString.decompressFromEncodedURIComponent(data)

let pc=peers[id]

if(!pc) pc=newPeer(id)

knownPeers[id]=code

if(type==="o"){

pc.setRemoteDescription({type:"offer",sdp:sdp})

pc.createAnswer().then(a=>pc.setLocalDescription(a))

pc.onicecandidate=e=>{
if(!e.candidate){

let s=LZString.compressToEncodedURIComponent(pc.localDescription.sdp)

let answer=id+"a"+s

myCode.value=answer

knownPeers[id]=answer

}
}

}

else if(type==="a"){

pc.setRemoteDescription({type:"answer",sdp:sdp})

}

}

function setupChannel(id){

channels[id].onopen=()=>{

updateCount()

channels[id].send(JSON.stringify({
type:"hello",
id:myId,
user:myUser
}))

}

channels[id].onmessage=e=>{

let data

try{
data=JSON.parse(e.data)
}catch{
return
}

if(data.type==="hello"){

knownPeers[data.id]=data

autoConnect(data.id)

return
}

if(data.type==="signal"){

if(data.target!==myId){

relay(data)

return

}

handleSignal(data)

return
}

broadcastMessage(data,id)

}

channels[id].onclose=()=>{

delete peers[id]
delete channels[id]

updateCount()

}

}

function autoConnect(peerId){

if(peerId===myId) return

if(peers[peerId]) return

broadcastSignal({

type:"signal",
target:peerId,
from:myId,
signalType:"request"

})

}

function handleSignal(data){

if(data.signalType==="request"){

let pc=newPeer(data.from)

let ch=pc.createDataChannel("chat")

channels[data.from]=ch

setupChannel(data.from)

pc.createOffer().then(o=>pc.setLocalDescription(o))

pc.onicecandidate=e=>{
if(!e.candidate){

let s=LZString.compressToEncodedURIComponent(pc.localDescription.sdp)

broadcastSignal({

type:"signal",
target:data.from,
from:myId,
signalType:"offer",
sdp:s

})

}
}

}

if(data.signalType==="offer"){

let pc=newPeer(data.from)

let sdp=LZString.decompressFromEncodedURIComponent(data.sdp)

pc.setRemoteDescription({type:"offer",sdp:sdp})

pc.createAnswer().then(a=>pc.setLocalDescription(a))

pc.onicecandidate=e=>{
if(!e.candidate){

let s=LZString.compressToEncodedURIComponent(pc.localDescription.sdp)

broadcastSignal({

type:"signal",
target:data.from,
from:myId,
signalType:"answer",
sdp:s

})

}
}

}

if(data.signalType==="answer"){

let pc=peers[data.from]

if(!pc) return

let sdp=LZString.decompressFromEncodedURIComponent(data.sdp)

pc.setRemoteDescription({type:"answer",sdp:sdp})

}

}

function broadcastSignal(obj){

for(let id in channels){

if(channels[id].readyState==="open"){

channels[id].send(JSON.stringify(obj))

}

}

}

function relay(obj){

for(let id in channels){

channels[id].send(JSON.stringify(obj))

}

}

function sendMsg(){

let text=msg.value.trim()

if(!text) return

let msgObj={
id:uid(),
text:text,
sender:myUser
}

broadcastMessage(msgObj)

msg.value=""

}

function broadcastMessage(msgObj,idFrom=null){

if(seenMsgs.has(msgObj.id)) return

seenMsgs.add(msgObj.id)

for(let id in channels){

if(id!==idFrom && channels[id].readyState==="open"){

channels[id].send(JSON.stringify(msgObj))

}

}

let div=document.createElement("div")

if(msgObj.sender===myUser){
div.className="msg me"
}
else{
div.className="msg peer"
}

div.innerText=msgObj.sender+" : "+msgObj.text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

function updateCount(){

let n=0

for(let id in channels){

if(channels[id].readyState==="open") n++

}

count.innerText=n

}

function copyText(id){

let t=document.getElementById(id)

t.select()

document.execCommand("copy")

}

async function pasteText(id){

let text=await navigator.clipboard.readText()

document.getElementById(id).value=text

}

msg.addEventListener("keypress",e=>{
if(e.key==="Enter"){
e.preventDefault()
sendMsg()
}
})

</script>

</body>
</html>
