<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>P2P Hypercore Chat Demo</title>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>
body{
  font-family:system-ui;
  background:#f4f6f9;
  margin:0;
}

header{
  background:#111827;
  color:white;
  padding:20px;
  text-align:center;
}

.container{
  max-width:100%; /* full lebar di mobile */
  margin:auto;
  padding:10px;  /* padding lebih kecil di mobile */
  box-sizing:border-box;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

input,button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:6px;
  border:1px solid #ccc;
  box-sizing:border-box;
  font-size:16px;
}

button{
  background:#2563eb;
  color:white;
  border:none;
  cursor:pointer;
}

button:active{
  background:#1e4fd8;
}

#chat{
  background:#0f172a;
  color:white;
  padding:10px;
  height:250px; /* lebih kecil agar muat layar */
  overflow-y:auto;
  font-family:monospace;
  border-radius:6px;
}

.copyRow{
display:flex;
gap:6px;
}

.copyRow input{
flex:1;
}

.copyRow button{
width:80px;
padding:10px;
}

/* Responsive mobile */
@media (max-width:600px){
  .card{
    padding:10px;
    margin-bottom:10px;
  }

  input,button{
    font-size:14px;
    padding:10px;
  }

  #chat{
    height:200px;
  }
}
</style>
</head>

<body>

<header>
<h1>P2P Group Chat Demo</h1>
<p>Konsep Hypercore append-only chat log</p>
</header>

<div class="container">

<div class="card">
<h3>Identitas</h3>
<p>Public Key:</p>

<div class="copyRow">
<input id="myId" readonly>
<button id="copyBtn">Copy</button>
</div>

<p>Connect ke Peer:</p>
<input id="peerId" placeholder="Masukkan Peer ID">
<button id="connectBtn">Connect</button>
</div>

<div class="card">
<h3>Chat Group</h3>
<div id="chat"></div>
<input id="messageInput" placeholder="Tulis pesan...">
<button id="sendBtn">Kirim</button>
</div>

</div>

<script>
let chatLog=[]
let connections=[]

const peer=new Peer()

const chat=document.getElementById("chat")
let username=""
const myId=document.getElementById("myId")
const peerId=document.getElementById("peerId")
const connectBtn=document.getElementById("connectBtn")
const sendBtn=document.getElementById("sendBtn")
const messageInput=document.getElementById("messageInput")

// ===== AUTO GENERATE USERNAME =====

const animals=[
"Kucing","Anjing","Kelinci","Burung","Kuda",
"Kambing","Domba","Ayam","Bebek","Ikan",
"Panda","Rubah","Singa","Harimau","Gajah",
"Ular","KuraKura","Koala","Serigala","Elang"
]

const colors=[
"Merah","Biru","Hijau","Kuning","Hitam",
"Putih","Ungu","Oranye","Coklat","Pink",
"Emas","Perak","Abu","Toska","Magenta"
]

function generateName(){

const animal=animals[Math.floor(Math.random()*animals.length)]
const color=colors[Math.floor(Math.random()*colors.length)]
const number=Math.floor(Math.random()*1000).toString().padStart(3,"0")

return animal+color+number

}

// cek apakah sudah ada di localStorage
let savedName=localStorage.getItem("chatUsername")

if(!savedName){
savedName=generateName()
localStorage.setItem("chatUsername",savedName)
}

username=savedName

function render(){
  chat.innerText = chatLog.map(m=>`${m.user}: ${m.text}`).join("\n")
  chat.scrollTop = chat.scrollHeight
}

function broadcast(msg){
  connections.forEach(c=>{
    if(c.open) c.send(msg)
  })
}

sendBtn.onclick = ()=>{
  const text = messageInput.value.trim()
  if(!text) return
  const msg = {user: username||"anon", text, time: Date.now()}
  chatLog.push(msg)
  render()
  broadcast({type:"chat", msg})
  messageInput.value = ""
}

peer.on("open", id=>{
  myId.value = id
  chatLog.push({user:"System", text:`Peer siap dengan ID: ${id}`})
  render()
})

connectBtn.onclick = ()=>{
  const conn = peer.connect(peerId.value)
  setup(conn)
}

peer.on("connection", conn=>{
  setup(conn)
})

const copyBtn=document.getElementById("copyBtn")

copyBtn.onclick=()=>{

navigator.clipboard.writeText(myId.value)

copyBtn.innerText="Copied"

setTimeout(()=>{
copyBtn.innerText="Copy"
},1500)

}

function setup(conn){
  connections.push(conn)
  conn.on("open", ()=>{
    chatLog.push({user:"System", text:`Terhubung dengan ${conn.peer}`})
    render()
    conn.send({type:"sync", chatLog})
  })
  conn.on("data", data=>{
    if(data.type==="chat"){ chatLog.push(data.msg); render() }
    if(data.type==="sync"){ chatLog=data.chatLog; render() }
  })
  conn.on("close", ()=>{
    chatLog.push({user:"System", text:`Peer ${conn.peer} terputus`})
    render()
    connections = connections.filter(c => c !== conn)
  })
}
</script>

</body>
</html>
