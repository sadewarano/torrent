<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>WebTorrent + Save As</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>

<style>
body{font-family: system-ui, sans-serif; padding:16px; max-width:600px; margin:auto; background:#f5f5f5}
h2{text-align:center}
input,button{width:100%; padding:12px; margin:8px 0; font-size:1em; border-radius:8px; border:1px solid #ccc; box-sizing:border-box}
button{border:none; cursor:pointer; font-weight:600; color:#fff}
.btn-seed{background:#4CAF50}.btn-copy{background:#2196F3}.btn-edit{background:#9C27B0}.btn-download{background:#FF9800}
button:disabled{background:#aaa; cursor:not-allowed}
.card{background:#fff; padding:12px; border-radius:8px; margin:10px 0; font-size:0.9em}
</style>
</head>
<body>

<h2>📤 WebTorrent + Save As</h2>

<input type="file" id="fileInput">
<input type="text" id="magnet" placeholder="Tempel magnet / hash BTIH">

<button class="btn-copy" id="copyBtn" onclick="copyMagnet()" disabled>📋 Salin Magnet</button>
<button class="btn-edit" id="shareBtn" onclick="shareMagnet()" disabled>📣 Share ke Telegram</button>
<button class="btn-download" onclick="download()">⬇️ Download</button>

<div class="card" id="info">ℹ️ Belum ada aktivitas</div>
<div class="card" id="stats">Mode: <span id="mode">Idle</span> | Progress: <span id="progress">0%</span> | Peer: <span id="peer">0</span></div>

<script>
const TOKEN = "8384730708:AAHjPCLYpW7wz2B5-jBxMJ17-kH1G1zXZuY";
const CHAT_ID = -1001538855794;
const MESSAGE_ID = 27;

const client = new WebTorrent();
let currentTorrent = null;

function log(msg){ document.getElementById("info").textContent = msg; }

function extractHash(input){
  const m = input.match(/btih:([a-f0-9]{40})/i);
  if(m) return m[1];
  if(/^[a-f0-9]{40}$/i.test(input)) return input;
  return null;
}

function buildMagnet(hash){
  const trackers = ["wss://tracker.openwebtorrent.com","wss://tracker.btorrent.xyz"];
  let m = `magnet:?xt=urn:btih:${hash}`;
  trackers.forEach(tr => m += `&tr=${encodeURIComponent(tr)}`);
  return m;
}

/* SEED */
document.getElementById("fileInput").onchange = () => {
  const file = document.getElementById("fileInput").files[0];
  if(!file) return;
  if(currentTorrent) currentTorrent.destroy();

  log("🌱 Membuat torrent...");
  client.seed(file, torrent => {
    currentTorrent = torrent;
    const hash = torrent.infoHash;
    document.getElementById("magnet").value = `magnet:?xt=urn:btih:${hash}`;
    document.getElementById("copyBtn").disabled = false;
    document.getElementById("shareBtn").disabled = false;
    document.getElementById("mode").textContent = "Seeding";
    log("✅ Magnet siap & seeding");
    torrent.on("wire", () => document.getElementById("peer").textContent = torrent.numPeers);
  });
}

/* COPY */
function copyMagnet(){
  const hash = extractHash(document.getElementById("magnet").value);
  if(!hash) return;
  navigator.clipboard.writeText(`magnet:?xt=urn:btih:${hash}`);
  log("📋 Magnet disalin");
}

/* DOWNLOAD + PILIH LOKASI */
async function download(){
  const hash = extractHash(document.getElementById("magnet").value.trim());
  if(!hash) { alert("Masukkan magnet/hash valid"); return; }

  client.add(buildMagnet(hash), async torrent => {
    currentTorrent = torrent;
    document.getElementById("mode").textContent = "Downloading";
    log("⬇️ Download dimulai...");

    torrent.on("download", () => {
      const p = Math.round(torrent.progress * 100);
      document.getElementById("progress").textContent = p + "%";
      document.getElementById("peer").textContent = torrent.numPeers;
    });

    torrent.on("done", async () => {
      log("✅ Download 100%. Pilih lokasi simpan...");
      document.getElementById("mode").textContent = "Selesai";

      for(const file of torrent.files){
        try{
          // 1. Minta user pilih lokasi. Kalau cancel = skip save
          const handle = await window.showSaveFilePicker({
            suggestedName: file.name,
            types: [{ description: 'File', accept: {'*/*': ['.*']} }]
          }).catch(()=>null);

          if(handle){
            // User pilih lokasi -> simpan ke disk
            const writable = await handle.createWritable();
            const stream = file.createReadStream();
            await stream.pipeTo(writable);
            log(`💾 Tersimpan: ${file.name}`);
          } else {
            // User cancel -> tetap di RAM, bisa jadi seeder
            log(`⚠️ ${file.name} tidak disimpan. Masih di RAM & bisa di-seed`);
          }
        }catch(e){
          log("❌ Gagal simpan: " + e.message);
        }
      }
      log("🌱 Sekarang mode Seeder. File aman sampai refresh tab");
    });

    torrent.on("wire", () => document.getElementById("peer").textContent = torrent.numPeers);
  });
}

/* EDIT TELEGRAM */
async function shareMagnet(){
  const hash = extractHash(document.getElementById("magnet").value);
  if(!hash) return;
  log("✏️ Mengedit pesan Telegram...");
  try{
    await fetch(`https://api.telegram.org/bot${TOKEN}/editMessageText`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ chat_id: CHAT_ID, message_id: MESSAGE_ID, text: hash, disable_web_page_preview: true })
    });
    log("✅ Pesan Telegram diperbarui");
  }catch(err){ log("❌ Error: " + err.message); }
}
</script>

</body>
</html>
