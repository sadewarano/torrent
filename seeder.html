<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WebTorrent + Save As</title>
<script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
<style>
body{font-family:system-ui;padding:16px;max-width:600px;margin:auto;background:#f5f5f5}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;box-sizing:border-box;border:1px solid #ccc}
button{border:none;color:#fff;font-weight:600;cursor:pointer}
.btn-copy{background:#2196F3}.btn-download{background:#FF9800}.btn-save{background:#009688}
button:disabled{background:#aaa;cursor:not-allowed}
.card{background:#fff;padding:12px;border-radius:8px;margin:10px 0}
#info{font-weight:600}
</style></head><body>
<h2>📤 WebTorrent + Save As</h2>
<input type="file" id="fileInput">
<input id="magnet" placeholder="Tempel magnet / hash BTIH">
<button class="btn-copy" id="copyBtn" disabled onclick="copyMagnet()">📋 Salin Magnet</button>
<button class="btn-download" onclick="downloadTorrent()">⬇️ Download</button>
<button class="btn-save" id="saveBtn" disabled onclick="saveFiles()">💾 Save As</button>
<div class="card" id="info">ℹ️ Belum ada aktivitas</div>
<div class="card">Mode: <span id="mode">Idle</span> | Progress: <span id="progress">0%</span> | Peer: <span id="peer">0</span></div>
<div class="card">
<h3>🌐 Magnet Terbaru</h3>
<div id="listMagnet">Loading...</div>
</div>
<script>
const API="https://script.google.com/macros/s/AKfycbwCi-pP169wRNLiieaXqn_hfejzSEm2HGGk0EpL2krYTmKkz6ky1_WoBsVcw3F3YxJoBg/exec";
const client=new WebTorrent();
let currentTorrent=null,downloadedFiles=[];

const info=document.getElementById('info'), mode=document.getElementById('mode'),
progress=document.getElementById('progress'), peer=document.getElementById('peer'),
magnet=document.getElementById('magnet'), copyBtn=document.getElementById('copyBtn'),
saveBtn=document.getElementById('saveBtn'), listMagnet=document.getElementById('listMagnet');

function log(t){info.textContent=t}
function extractHash(v){let m=v.match(/btih:([a-f0-9]{40})/i);if(m)return m[1];if(/^[a-f0-9]{40}$/i.test(v))return v;return null;}
function buildMagnet(h){let m='magnet:?xt=urn:btih:'+h;["wss://tracker.openwebtorrent.com","wss://tracker.btorrent.xyz"].forEach(tr=>m+="&tr="+encodeURIComponent(tr));return m;}

// PAS PILIH FILE LANGSUNG KIRIM KE GAS
fileInput.onchange=async()=>{
 let f=fileInput.files[0]; if(!f)return;
 if(currentTorrent)currentTorrent.destroy();
 log("🌱 Membuat torrent & kirim magnet ke server...");

 client.seed(f,async t=>{
   currentTorrent=t;
   const mag = 'magnet:?xt=urn:btih:'+t.infoHash;
   magnet.value = mag;
   copyBtn.disabled=false;
   mode.textContent="Seeding";
   log("✅ Magnet siap. Sedang share ke server...");

   await shareMagnet(mag); // kirim langsung
   ambil();
   log("✅ Magnet sudah dishare & seeding");
   t.on("wire",()=>peer.textContent=t.numPeers);
 });
};

function copyMagnet(){let h=extractHash(magnet.value);if(!h)return alert("Magnet tidak valid");navigator.clipboard.writeText("magnet:?xt=urn:btih:"+h);log("📋 Magnet disalin");}

function downloadTorrent(){
 let h=extractHash(magnet.value.trim()); if(!h){alert("Hash tidak valid");return;}
 if(currentTorrent)currentTorrent.destroy();
 downloadedFiles=[];
 saveBtn.disabled=true;
 log("⬇️ Mulai download...");
 client.add(buildMagnet(h),t=>{
   currentTorrent=t;mode.textContent="Downloading";
   t.on("download",()=>{progress.textContent=Math.round(t.progress*100)+"%";peer.textContent=t.numPeers;});
   t.on("wire",()=>peer.textContent=t.numPeers);
   t.on("done",()=>{
      downloadedFiles=t.files;
      saveBtn.disabled=false;
      mode.textContent="Done";
      log("✅ Download selesai. Klik Save As");
   });
   t.on("error",e=>log("❌ Error: "+e.message));
 });
}

async function saveFiles() {
  if (!downloadedFiles.length) return log("⚠️ Belum ada file");
  for (const file of downloadedFiles) {
    file.getBlob((err, blob) => {
      if (err) return log("❌ Gagal: " + err.message);
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = file.name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 5000);
      log("💾 Menyimpan: " + file.name);
    });
  }
}

// KIRIM KE GAS
async function shareMagnet(mag){
  try{
    const res=await fetch(API+"?t="+Date.now());
    const data=await res.json();
    let last = Array.isArray(data)&&data.length? data[data.length-1].kode||"" : data.kode||"";
    let arr=last?last.split(","):[];
    arr=arr.filter(v=>v.trim()!=mag);
    arr.unshift(mag); arr=arr.slice(0,5);

    await fetch(API,{
      method:"POST",
      mode:"cors", // penting biar nggak ke-block
      headers:{"Content-Type":"text/plain"}, // GAS paling aman pakai text/plain
      body:JSON.stringify({kode:arr.join(",")})
    });
  }catch(e){log("❌ Gagal share ke GAS: "+e.message)}
}

async function ambil(){
  try{
    const res=await fetch(API+"?t="+Date.now());
    const data=await res.json();
    let kode = Array.isArray(data)&&data.length? data[data.length-1].kode||"" : data.kode||"";
    listMagnet.innerHTML="";
    if(!kode){listMagnet.innerHTML="Belum ada magnet"; return;}
    kode.split(",").forEach(m=>{
      const div=document.createElement("div");
      div.style.margin="8px 0";
      const btn=document.createElement("button");
      btn.textContent="📋 Pakai Magnet Ini";
      btn.style.background="#4CAF50"; btn.style.color="#fff"; btn.style.border="none"; btn.style.padding="8px"; btn.style.width="100%";
      btn.onclick=()=>{ magnet.value=m; log("📋 Magnet dipilih. Klik Download"); };
      const txt=document.createElement("div");
      txt.style.wordBreak="break-all"; txt.style.fontSize="12px"; txt.textContent=m;
      div.appendChild(btn); div.appendChild(txt);
      listMagnet.appendChild(div);
    });
  }catch(e){listMagnet.innerHTML="Gagal load magnet"}
}
ambil();
setInterval(ambil,5000);
</script></body></html>
