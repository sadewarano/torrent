<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>P2P Chat + WebTorrent Auto-Rejoin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
<style>
body{font-family:sans-serif;padding:10px;max-width:600px;margin:auto;}
textarea{width:100%;height:60px;margin:4px 0;border-radius:6px;padding:6px;}
button{padding:8px 12px;margin:4px;border-radius:6px;}
#chat{border:1px solid #ccc;padding:8px;height:200px;overflow:auto;}
.msg{margin:4px 0;}
.me{color:green;}
.peer{color:blue;}
</style>
</head>
<body>

<h2>Chat P2P via WebTorrent (Auto-Rejoin)</h2>

<div id="chat"></div>

<textarea id="msg" placeholder="Type message..."></textarea>
<button onclick="sendMsg()">Send</button>

<hr>

<label>Magnet / Torrent terbaru:</label>
<input type="text" id="magnet" placeholder="Paste magnet / BTIH" style="width:100%;">
<button onclick="downloadTorrent()">Download Latest</button>

<div id="info"></div>

<script>
const client = new WebTorrent();
let chatLog = [];
let currentTorrent = null;

// ================== LOAD LOCAL STORAGE ==================
if(localStorage.getItem("chatLog")){
    chatLog = JSON.parse(localStorage.getItem("chatLog"));
    renderChat();
}

// ================== SEND MESSAGE ==================
function sendMsg(){
    const textarea = document.getElementById("msg");
    const text = textarea.value.trim();
    if(!text) return;
    const msgObj = {id:Date.now(), text:text, sender:"Me"};
    chatLog.push(msgObj);
    localStorage.setItem("chatLog", JSON.stringify(chatLog));
    renderChat();
    textarea.value = "";
    createTorrent();
}

// ================== RENDER CHAT ==================
function renderChat(){
    const chat = document.getElementById("chat");
    chat.innerHTML = "";
    chatLog.forEach(m=>{
        const div = document.createElement("div");
        div.className = "msg " + (m.sender==="Me"?"me":"peer");
        div.innerText = m.sender + ": " + m.text;
        chat.appendChild(div);
    });
    chat.scrollTop = chat.scrollHeight;
}

// ================== CREATE TORRENT ==================
function createTorrent(){
    if(currentTorrent){
        currentTorrent.destroy();
        currentTorrent = null;
    }

    const blob = new Blob([JSON.stringify(chatLog, null, 2)], {type:"application/json"});
    client.seed(blob, torrent=>{
        currentTorrent = torrent;
        document.getElementById("magnet").value = torrent.magnetURI;
        document.getElementById("info").innerText = "✅ Torrent updated! Magnet ready.";
    });
}

// ================== DOWNLOAD TORRENT ==================
function downloadTorrent(){
    const magnet = document.getElementById("magnet").value.trim();
    if(!magnet) return alert("Masukkan magnet");

    client.add(magnet, torrent=>{
        currentTorrent = torrent;
        document.getElementById("info").innerText = "⬇️ Downloading chat log...";
        torrent.files[0].getBlob((err, blob)=>{
            if(err) return alert("Gagal ambil file");
            const reader = new FileReader();
            reader.onload = e=>{
                try{
                    chatLog = JSON.parse(e.target.result);
                    localStorage.setItem("chatLog", JSON.stringify(chatLog));
                    renderChat();
                    document.getElementById("info").innerText = "✅ Chat log updated from torrent";
                }catch(err){
                    alert("JSON error: "+err);
                }
            };
            reader.readAsText(blob);
        });
    });
}

</script>
</body>
</html>
