<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>P2P Chat Ultra Minimal</title>
<style>
body{font-family:Arial;margin:0;padding:0;display:flex;flex-direction:column;height:100vh}
header{background:#075E54;color:#fff;text-align:center;padding:10px}
textarea,input,button{font-size:14px;margin:5px}
.chat{flex:1;overflow-y:auto;background:#f9f9f9;padding:5px}
.msg{margin:2px;padding:4px;border-radius:5px}
.me{background:#dcf8c6;text-align:right}
.peer{background:#fff;text-align:left}
</style>
</head>
<body>
<header>P2P Chat Ultra Minimal</header>
<textarea id="conn" placeholder="Offer / Answer"></textarea>
<button onclick="gen()">Generate Offer</button>
<button onclick="proc()">Connect</button>
<div class="chat" id="chat"></div>
<input id="msg" placeholder="Type..." onkeypress="if(event.key==='Enter'){send()}">
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<script>
const id="p"+Date.now()+Math.floor(Math.random()*9999);
let pc=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]}),dc,chs={}; 
function gen(){
  dc=pc.createDataChannel("c");
  dc.onmessage=e=>add(e.data,'peer');
  pc.createOffer().then(o=>pc.setLocalDescription(o));
  pc.onicecandidate=e=>{
    if(!e.candidate){
      let s=LZString.compressToEncodedURIComponent(pc.localDescription.sdp);
      document.getElementById('conn').value=id+"o"+s;
    }
  };
}
function proc(){
  let code=document.getElementById('conn').value.trim();
  let pid=code.match(/^p\d+/)[0],type=code[pid.length],sdp=LZString.decompressFromEncodedURIComponent(code.slice(pid.length+1));
  pc.setRemoteDescription({type:type==='o'?'offer':'answer',sdp:sdp});
  if(type==='o'){
    pc.createAnswer().then(a=>pc.setLocalDescription(a));
    pc.onicecandidate=e=>{
      if(!e.candidate){
        let s=LZString.compressToEncodedURIComponent(pc.localDescription.sdp);
        document.getElementById('conn').value=id+"a"+s;
      }
    };
  }
  pc.ondatachannel=e=>{dc=e.channel;dc.onmessage=ev=>add(ev.data,'peer')};
}
function send(){
  let m=document.getElementById('msg').value;
  if(!m) return;
  dc?.send(m); add(m,'me'); document.getElementById('msg').value='';
}
function add(t,c){let d=document.createElement('div');d.className='msg '+c;d.innerText=t;document.getElementById('chat').appendChild(d);}
</script>
</body>
</html>
