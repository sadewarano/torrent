<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minimal P2P Chat</title>
<style>
body{font-family:Arial;display:flex;flex-direction:column;height:100vh;margin:0;}
header{background:#075E54;color:white;padding:10px;text-align:center;font-weight:bold;}
#chat{flex:1;overflow-y:auto;padding:10px;border-top:1px solid #ccc;}
.msg{margin:5px;padding:8px;border-radius:6px;max-width:70%;}
.me{background:#dcf8c6;align-self:flex-end;}
.peer{background:#fff;align-self:flex-start;}
input{padding:8px;border-radius:20px;border:1px solid #ccc;flex:1;}
button{padding:8px 12px;border:none;border-radius:6px;background:#128C7E;color:white;}
#inputBar{display:flex;padding:10px;gap:5px;border-top:1px solid #ccc;}
textarea{width:100%;height:70px;margin-top:5px;}
</style>
</head>
<body>

<header>Minimal P2P Chat</header>
<div id="chat"></div>

<div id="controls">
<button onclick="createOffer()">Generate Offer</button>
<textarea id="connCode" placeholder="Connection code"></textarea>
<button onclick="copyText()">Copy</button>
<button onclick="pasteCode()">Paste & Connect</button>
</div>

<div id="inputBar">
<input id="msg" placeholder="Type message...">
<button onclick="sendMsg()">Send</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<script>
const myUser="User"+Math.floor(Math.random()*10000);
let pc, channel; // global channel
function createOffer(){
  pc = new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
  channel = pc.createDataChannel("chat");
  setupChannel(channel);
  pc.onicecandidate = e => {
    if(!e.candidate){
      // kompres base64
      document.getElementById("connCode").value = LZString.compressToEncodedURIComponent(pc.localDescription.sdp);
    }
  };
  pc.createOffer().then(o=>pc.setLocalDescription(o));
}

function pasteCode(){
  let sdp = LZString.decompressFromEncodedURIComponent(document.getElementById("connCode").value.trim());
  pc = new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
  pc.ondatachannel = e => {
    channel = e.channel;
    setupChannel(channel);
  };
  pc.setRemoteDescription({type:"offer", sdp:sdp}).then(()=>{
    pc.createAnswer().then(a=>{
      pc.setLocalDescription(a).then(()=>{
        document.getElementById("connCode").value = LZString.compressToEncodedURIComponent(pc.localDescription.sdp);
      });
    });
  });
  pc.onicecandidate = e => {
    if(!e.candidate){
      document.getElementById("connCode").value = LZString.compressToEncodedURIComponent(pc.localDescription.sdp);
    }
  };
}

function setupChannel(ch){
  ch.onopen = ()=>console.log("Connected!");
  ch.onmessage = e => addMsg("peer", e.data);
}

function sendMsg(){
  let text = document.getElementById("msg").value;
  if(!text || !channel || channel.readyState!=="open") return;
  channel.send(text);
  addMsg("me", text);
  document.getElementById("msg").value="";
}

function addMsg(cls, text){
  let div = document.createElement("div");
  div.className="msg "+cls;
  div.innerText=text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop=document.getElementById("chat").scrollHeight;
}

function copyText(){
  document.getElementById("connCode").select();
  document.execCommand("copy");
}
</script>

</body>
</html>
