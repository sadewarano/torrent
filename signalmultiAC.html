<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minimal P2P Chat</title>
<style>
body{font-family:Arial;margin:0;display:flex;flex-direction:column;height:100vh;}
header{background:#075E54;color:white;padding:10px;text-align:center;}
#chat{flex:1;overflow:auto;padding:5px;background:#f9f9f9;}
.inputBar{display:flex;padding:5px;}
input{flex:1;padding:8px;margin-right:5px;}
button{padding:8px;background:#128C7E;color:white;border:none;}
.msg{margin:2px 0;}
.me{color:green;}
.peer{color:blue;}
</style>
</head>
<body>

<header>Minimal P2P Chat</header>
<div id="chat"></div>
<div class="inputBar">
  <input id="msg" placeholder="Type...">
  <button onclick="sendMsg()">Send</button>
</div>
<textarea id="conn" placeholder="Offer / Answer" style="width:100%;height:50px;margin-top:5px;"></textarea>
<button onclick="process()">Connect</button>

<script>
let pc = new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
let ch = pc.createDataChannel("c");
ch.onmessage = e => addMsg(e.data, 'peer');
ch.onopen = () => console.log("Channel open");
pc.onicecandidate = e => { if(!e.candidate) conn.value = JSON.stringify(pc.localDescription); }

function uid(){return "U"+Math.floor(Math.random()*10000);}
let myId = uid();

function addMsg(txt,cls){
  let d = document.createElement('div'); d.className='msg '+cls; d.textContent=txt; chat.appendChild(d); chat.scrollTop=chat.scrollHeight;
}

function sendMsg(){
  let t = msg.value.trim(); if(!t) return;
  ch.send(t); addMsg(t,'me'); msg.value='';
}

async function process(){
  let data = JSON.parse(conn.value);
  if(data.type==='offer'){
    await pc.setRemoteDescription(data);
    let a = await pc.createAnswer();
    await pc.setLocalDescription(a);
    conn.value = JSON.stringify(pc.localDescription);
  } else if(data.type==='answer'){
    await pc.setRemoteDescription(data);
  }
}

async function createOffer(){
  let o = await pc.createOffer();
  await pc.setLocalDescription(o);
  conn.value = JSON.stringify(pc.localDescription);
}

// auto create minimal offer on load
createOffer();
</script>

</body>
</html>
