<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2P Hypercore Chat Demo</title>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>
body{
font-family:system-ui;
background:#f4f6f9;
margin:0;
}

header{
background:#111827;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:100%;
margin:auto;
padding:10px;
box-sizing:border-box;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 4px 12px rgba(0,0,0,.06);
}

input,button{
width:100%;
padding:12px;
margin-top:8px;
border-radius:6px;
border:1px solid #ccc;
box-sizing:border-box;
font-size:16px;
}

button{
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

#chat{
background:#0f172a;
color:white;
padding:10px;
height:40vh;
overflow-y:auto;
font-family:monospace;
border-radius:6px;
}

.copyRow{
display:flex;
align-items:center;
gap:6px;
}

.copyRow p{
margin:0;
white-space:nowrap;
}

.copyRow input{
flex:1;
}

.copyRow button{
width:70px;
}

.connectRow{
display:flex;
align-items:center;
gap:6px;
margin-top:8px;
}

.connectRow p{
margin:0;
white-space:nowrap;
}

.connectRow input{
flex:1;
}

.connectRow button{
width:80px;
}

input{
min-width:0;
}

#myId{
font-size:12px;
}
</style>
</head>

<body>

<header>
<h1>P2P Group Chat Demo</h1>
<p>Konsep Hypercore append-only chat log</p>
</header>

<div class="container">

<div class="card">

<div class="copyRow">
<p>Public Key:</p>
<input id="myId" readonly>
<button id="copyBtn">Copy</button>
<button id="shareBtn">Share</button>
</div>

<div class="connectRow">
<p>Connect:</p>
<input id="peerId" placeholder="Peer ID">
<button id="pasteBtn">Paste</button>
<button id="ambilBtn">Ambil</button>
</div>

</div>

<div class="card">
<h3>Chat Group</h3>
<div id="chat"></div>
<input id="messageInput" placeholder="Tulis pesan...">
<button id="sendBtn">Kirim</button>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwCi-pP169wRNLiieaXqn_hfejzSEm2HGGk0EpL2krYTmKkz6ky1_WoBsVcw3F3YxJoBg/exec"

let chatLog=[]
let connections=[]

const peer=new Peer()

const chat=document.getElementById("chat")
const myId=document.getElementById("myId")
const peerId=document.getElementById("peerId")

const pasteBtn=document.getElementById("pasteBtn")
const shareBtn=document.getElementById("shareBtn")
const ambilBtn=document.getElementById("ambilBtn")

const sendBtn=document.getElementById("sendBtn")
const messageInput=document.getElementById("messageInput")

let username="User"+Math.floor(Math.random()*999)

function render(){
chat.innerText = chatLog.map(m=>`${m.user}: ${m.text}`).join("\n")
chat.scrollTop = chat.scrollHeight
}

function broadcast(msg){
connections.forEach(c=>{
if(c.open) c.send(msg)
})
}

sendBtn.onclick = ()=>{
const text = messageInput.value.trim()
if(!text) return

const msg = {user: username, text, time: Date.now()}

chatLog.push(msg)
render()

broadcast({type:"chat", msg})

messageInput.value=""
}

peer.on("open", id=>{
myId.value=id
chatLog.push({user:"System",text:"Peer siap dengan ID: "+id})
render()
})

peer.on("connection", conn=>{
setup(conn)
})

function setup(conn){

connections.push(conn)

conn.on("open",()=>{
chatLog.push({user:"System",text:"Terhubung dengan "+conn.peer})
render()

conn.send({type:"sync",chatLog})
})

conn.on("data",data=>{

if(data.type==="chat"){
chatLog.push(data.msg)
render()
}

if(data.type==="sync"){
chatLog=data.chatLog
render()
}

})

conn.on("close",()=>{
chatLog.push({user:"System",text:"Peer "+conn.peer+" terputus"})
render()

connections = connections.filter(c=>c!==conn)
})

}

copyBtn.onclick=()=>{
navigator.clipboard.writeText(myId.value)

copyBtn.innerText="Copied"

setTimeout(()=>{
copyBtn.innerText="Copy"
},1500)
}

pasteBtn.onclick = async ()=>{

try{

const text = await navigator.clipboard.readText()

peerId.value = text.trim()

autoConnect()

}catch{

alert("Clipboard tidak bisa diakses")

}

}

function autoConnect(){

const id = peerId.value.trim()

if(!id) return

if(id===myId.value){
alert("Tidak bisa connect ke diri sendiri")
return
}

const conn = peer.connect(id)

setup(conn)

}

peerId.addEventListener("input", autoConnect)


// ===== SHARE KE GAS =====

shareBtn.onclick=()=>{

fetch(API,{
method:"POST",
body:JSON.stringify({kode:myId.value})
})

shareBtn.innerText="Shared"

setTimeout(()=>{
shareBtn.innerText="Share"
},1500)

}


// ===== AMBIL DATA TERAKHIR =====

ambilBtn.onclick = async () => {
  try {
    const res = await fetch(API);
    const data = await res.json();

    // Jika data kosong, hentikan
    if (!data || !data.kode) return;

    const last = data.kode;

    // jangan connect ke diri sendiri
    if (last === myId.value) return;

    // salin ke clipboard
    await navigator.clipboard.writeText(last);

    // isi input peerId
    peerId.value = last;

    // auto connect
    autoConnect();

    ambilBtn.innerText = "Copied";
    setTimeout(() => {
      ambilBtn.innerText = "Ambil";
    }, 1500);

  } catch (err) {
    console.error("Gagal ambil data dari GAS:", err);
    alert("Gagal ambil data. Periksa koneksi atau GAS.");
  }
}

</script>

</body>
</html>
