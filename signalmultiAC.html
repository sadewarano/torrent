<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minimal P2P Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<style>
body{font-family:Arial;margin:0;display:flex;flex-direction:column;height:100vh;background:#e5ddd5;}
header{background:#075E54;color:white;padding:12px;text-align:center;font-weight:bold;}
.status{background:white;padding:8px;text-align:center;font-size:14px;border-bottom:1px solid #ddd;}
.controls{background:white;padding:10px;border-bottom:1px solid #ddd;}
textarea{width:100%;height:70px;border-radius:6px;border:1px solid #ccc;padding:6px;margin-top:5px;font-size:16px;}
button{background:#128C7E;color:white;border:none;padding:8px 12px;border-radius:6px;margin-top:5px;}
.chat{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;background:#f9f9f9;}
.msg{max-width:70%;padding:8px 10px;border-radius:10px;font-size:14px;word-wrap:break-word;}
.me{align-self:flex-end;background:#dcf8c6;}
.peer{align-self:flex-start;background:white;}
.inputBar{display:flex;gap:5px;padding:8px;border-top:1px solid #ddd;background:white;}
.inputBar input{flex:1;padding:10px;border-radius:20px;border:1px solid #ccc;font-size:16px;}
.send{background:#128C7E;border:none;color:white;padding:10px 16px;border-radius:20px;}
</style>
</head>
<body>

<header>Minimal P2P Chat</header>

<div class="status">Peers connected: <b id="count">0</b></div>

<div class="controls">
<button onclick="createOfferMinimal()">Generate Offer</button>
<textarea id="connCode" placeholder="Offer / Answer"></textarea>
<div style="display:flex;gap:5px;margin-top:5px;">
<button onclick="copyText('connCode')">Copy</button>
<button onclick="pasteText()">Paste</button>
</div>
</div>

<div id="chat" class="chat"></div>

<div class="inputBar">
<input id="msg" placeholder="Type message...">
<button class="send" onclick="sendMsgMinimal()">Send</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<script>
let pcGlobal, channelGlobal, myUser="User"+Math.floor(Math.random()*10000);

// Minimal add message
function addMsg(sender,text){
  let div=document.createElement("div");
  div.className = (sender===myUser) ? "msg me":"msg peer";
  div.innerText = sender+" : "+text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop=document.getElementById("chat").scrollHeight;
}

// Minimal offer
function createOfferMinimal(){
  let pc = new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
  let ch = pc.createDataChannel("chat");
  channelGlobal = ch;
  ch.onopen=()=>updateCount();
  ch.onmessage = e => addMsg("peer", e.data);
  pc.createOffer().then(o=>pc.setLocalDescription(o));
  pc.onicecandidate = e=>{
    if(!e.candidate){
      document.getElementById("connCode").value = LZString.compressToEncodedURIComponent(pc.localDescription.sdp);
      pcGlobal = pc;
    }
  };
}

// Minimal answer / paste
function pasteText(){
  navigator.clipboard.readText().then(text=>{
    let sdp=LZString.decompressFromEncodedURIComponent(text.trim());
    let pc = new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
    pc.ondatachannel = e=>{
      channelGlobal = e.channel;
      e.channel.onmessage = ev => addMsg("peer", ev.data);
      e.channel.onopen = ()=>updateCount();
    };
    pc.setRemoteDescription({type:"offer",sdp:sdp}).then(()=>{
      pc.createAnswer().then(a=>{
        pc.setLocalDescription(a).then(()=>{
          document.getElementById("connCode").value = LZString.compressToEncodedURIComponent(pc.localDescription.sdp);
        });
      });
    });
    pcGlobal = pc;
  });
}

// Send message minimal
function sendMsgMinimal(){
  let text=document.getElementById("msg").value.trim();
  if(!text || !channelGlobal || channelGlobal.readyState!=="open") return;
  channelGlobal.send(text);
  addMsg(myUser,text);
  document.getElementById("msg").value="";document.getElementById("msg").focus();
}

function updateCount(){document.getElementById("count").innerText=(channelGlobal&&channelGlobal.readyState==="open")?1:0;}
function copyText(id){let t=document.getElementById(id); t.select();document.execCommand("copy");}
</script>

</body>
</html>
