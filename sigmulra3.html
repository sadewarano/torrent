<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>P2P Multi Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#e5ddd5;
margin:0;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#075E54;
color:white;
padding:12px;
text-align:center;
font-weight:bold;
}

.status{
background:white;
padding:8px;
text-align:center;
font-size:14px;
border-bottom:1px solid #ddd;
}

.controls{
background:white;
padding:10px;
border-bottom:1px solid #ddd;
}

textarea{
width:100%;
height:70px;
border-radius:6px;
border:1px solid #ccc;
padding:6px;
margin-top:5px;
}

button{
background:#128C7E;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
margin-top:5px;
}

.row{
display:flex;
gap:5px;
}

.chat{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.msg{
max-width:70%;
padding:8px 10px;
border-radius:10px;
font-size:14px;
word-wrap:break-word;
}

.me{
align-self:flex-end;
background:#dcf8c6;
}

.peer{
align-self:flex-start;
background:white;
}

.inputBar{
display:flex;
background:white;
padding:8px;
gap:5px;
border-top:1px solid #ddd;
}

.inputBar input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

.send{
background:#128C7E;
border:none;
color:white;
padding:10px 16px;
border-radius:20px;
}

.broadcast{
height:140px;
overflow-y:auto;
background:#fff8dc;
border-top:1px solid #ddd;
padding:8px;
font-size:13px;
}

.broadcastMsg{
padding:4px;
border-bottom:1px dashed #ccc;
}

</style>
</head>

<body>

<header>P2P Multi Chat</header>

<div class="status">
User: <b id="myName"></b> |
Peers connected: <b id="count">0</b>
</div>

<div class="controls">

<button onclick="createOffer()">Generate Offer</button>

<textarea id="myCode" placeholder="your code"></textarea>

<div class="row">
<button onclick="copyText('myCode')">Copy</button>
</div>

<textarea id="partnerCode" placeholder="partner code"></textarea>

<div class="row">
<button onclick="pasteText('partnerCode')">Paste</button>
<button onclick="processCode()">Connect</button>
</div>

</div>

<div id="chat" class="chat"></div>

<div class="inputBar">
<input id="msg" placeholder="Type message...">
<button class="send" onclick="sendMsg()">Send</button>
</div>

<div id="broadcast" class="broadcast"></div>

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>

<script>

let peers={}
let channels={}
let seenMsgs=new Set()

/* USERNAME PERSISTENT */

function randomUser(){

let chars="abcdefghijklmnopqrstuvwxyz0123456789"
let name="u"

for(let i=0;i<6;i++){
name+=chars[Math.floor(Math.random()chars.length)]
}

name+=Date.now().toString().slice(-3)

return name
}

let username=localStorage.getItem("p2pUser")

if(!username){
username=randomUser()
localStorage.setItem("p2pUser",username)
}

document.getElementById("myName").innerText=username


/ MESSAGE ID */

function uid(){
return "m"+Date.now()+Math.floor(Math.random()*10000)
}

function pid(){
return "p"+Date.now()+Math.floor(Math.random()10000)
}


/ PEER CONNECTION /

function newPeer(id){

let pc=new RTCPeerConnection({
iceServers:[{urls:"stun:stun.l.google.com:19302"}]
})

pc.ondatachannel=e=>{
channels[id]=e.channel
setupChannel(id)
}

peers[id]=pc

return pc
}


/ CREATE OFFER /

function createOffer(){

let id=pid()

let pc=newPeer(id)

let ch=pc.createDataChannel("chat")
channels[id]=ch

setupChannel(id)

pc.createOffer().then(o=>pc.setLocalDescription(o))

pc.onicecandidate=e=>{
if(!e.candidate){

let s=LZString.compressToEncodedURIComponent(pc.localDescription.sdp)
myCode.value=id+"o"+s

}
}

}


/ PROCESS CODE /

function processCode(){

let code=partnerCode.value.trim()

let id=code.match(/^p\d+/)[0]

let type=code[id.length]

let data=code.slice(id.length+1)

let sdp=LZString.decompressFromEncodedURIComponent(data)

let pc=peers[id] || newPeer(id)

if(type==="o"){

pc.setRemoteDescription({type:"offer",sdp:sdp})

pc.createAnswer().then(a=>pc.setLocalDescription(a))

pc.onicecandidate=e=>{
if(!e.candidate){

let s=LZString.compressToEncodedURIComponent(pc.localDescription.sdp)
myCode.value=id+"a"+s

}
}

}

else if(type==="a"){

pc.setRemoteDescription({type:"answer",sdp:sdp})

}

}


/ CHANNEL SETUP /

function setupChannel(id){

channels[id].onopen=updateCount

channels[id].onmessage=e=>{
handleIncoming(e.data,id)
}

channels[id].onclose=updateCount

}


/ SEND MESSAGE /

function sendMsg(){

let text=msg.value.trim()

if(!text) return

let message={
id:uid(),
user:username,
text:text
}

let raw=JSON.stringify(message)

seenMsgs.add(message.id)

broadcast(raw)

addChat(text,true)

addBroadcast(username,text)

msg.value=""

}


/ RECEIVE MESSAGE /

function handleIncoming(raw,from){

let message=JSON.parse(raw)

if(seenMsgs.has(message.id)) return

seenMsgs.add(message.id)

addChat(message.text,false,message.user)
addBroadcast(message.user,message.text)

broadcast(raw,from)

}


/ BROADCAST /

function broadcast(raw,except=null){

for(let id in channels){

let ch=channels[id]

if(ch.readyState==="open" && id!==except){
ch.send(raw)
}

}

}


/ UI CHAT /

function addChat(text,isMe,user=""){

let div=document.createElement("div")

div.className="msg "+(isMe?"me":"peer")

div.innerText=isMe ? text : user+": "+text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}


/ UI BROADCAST /

function addBroadcast(user,text){

let div=document.createElement("div")

div.className="broadcastMsg"

div.innerText=user+": "+text

broadcast.appendChild(div)

broadcast.scrollTop=broadcast.scrollHeight

}


/ PEER COUNT /

function updateCount(){

let n=0

for(let id in channels){
if(channels[id].readyState==="open") n++
}

count.innerText=n

}


/ COPY / PASTE /

function copyText(id){

let t=document.getElementById(id)
t.select()
document.execCommand("copy")

}

async function pasteText(id){

let text=await navigator.clipboard.readText()
document.getElementById(id).value=text

}


/ ENTER SEND */

msg.addEventListener("keypress",function(e){

if(e.key==="Enter"){
e.preventDefault()
sendMsg()
}

})

</script>

</body>
</html>
