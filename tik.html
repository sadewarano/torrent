<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Pengiriman</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#eef2f7;
    padding:15px;
    color:#222;
}

.container{
    max-width:500px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h1{
    font-size:24px;
    margin-bottom:5px;
}

.header p{
    color:#666;
    font-size:14px;
}

.card{
    background:#fff;
    border-radius:14px;
    padding:16px;
    margin-bottom:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.title{
    font-size:15px;
    font-weight:bold;
    margin-bottom:10px;
    color:#2563eb;
}

textarea{
    width:100%;
    border:none;
    resize:none;
    background:#f5f7fb;
    padding:12px;
    border-radius:10px;
    font-size:14px;
    line-height:1.5;
    outline:none;
    min-height:70px;
}

.link-box{
    background:#f5f7fb;
    padding:12px;
    border-radius:10px;
    word-break:break-all;
}

.link-box a{
    color:#2563eb;
    text-decoration:none;
    font-size:14px;
    line-height:1.5;
}

.link-box a:hover{
    text-decoration:underline;
}

button{
    width:100%;
    margin-top:10px;
    border:none;
    background:#2563eb;
    color:white;
    padding:12px;
    border-radius:10px;
    font-size:14px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:active{
    transform:scale(0.98);
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Data Pengiriman</h1>
        <p>Klik tombol untuk copy data</p>
    </div>

    <!-- LINK PRODUK 1 -->
    <div class="card">
        <div class="title">Link Produk 1</div>

        <div class="link-box">
            <a href="https://vt.tokopedia.com/t/ZS9YQapQhN7WR-JVtO7/" target="_blank">
                https://vt.tokopedia.com/t/ZS9YQapQhN7WR-JVtO7/
            </a>
        </div>

        <textarea id="link1" readonly style="position:absolute; left:-9999px;">
https://vt.tokopedia.com/t/ZS9YQapQhN7WR-JVtO7/
        </textarea>

        <button onclick="copyById('link1', this)">
            Copy Link Produk 1
        </button>
    </div>

    <!-- LINK PRODUK 2 -->
    <div class="card">
        <div class="title">Link Produk 2</div>

        <div class="link-box">
            <a href="https://vt.tiktok.com/ZSxP7hyGD/" target="_blank">
                https://vt.tiktok.com/ZSxP7hyGD/
            </a>
        </div>

        <textarea id="link2" readonly style="position:absolute; left:-9999px;">
https://vt.tiktok.com/ZSxP7hyGD/
        </textarea>

        <button onclick="copyById('link2', this)">
            Copy Link Produk 2
        </button>
    </div>

    <!-- NAMA -->
    <div class="card">
        <div class="title">Nama</div>
        <textarea readonly>madgazan</textarea>
        <button onclick="copyText(this)">Copy Nama</button>
    </div>

    <!-- NO HP -->
    <div class="card">
        <div class="title">No HP</div>
        <textarea readonly>085227186724</textarea>
        <button onclick="copyText(this)">Copy No HP</button>
    </div>

    <!-- ALAMAT -->
    <div class="card">
        <div class="title">Alamat</div>
        <textarea readonly>Desa Panembangan
Kecamatan Cilongok
Kabupaten Banyumas
Provinsi Jawa Tengah</textarea>
        <button onclick="copyText(this)">Copy Alamat</button>
    </div>

    <!-- ALAMAT LENGKAP -->
    <div class="card">
        <div class="title">Alamat Lengkap</div>
        <textarea readonly>Utara Wr. Ibu Sekesih Sabrang Wetan RT 002/002 Panembangan Cilongok Banyumas</textarea>
        <button onclick="copyText(this)">Copy Alamat Lengkap</button>
    </div>

</div>

<script>
function copyText(button){
    const textarea = button.previousElementSibling;

    textarea.select();
    textarea.setSelectionRange(0, 99999);

    navigator.clipboard.writeText(textarea.value);

    const original = button.innerText;
    button.innerText = "Berhasil Disalin ✓";

    setTimeout(() => {
        button.innerText = original;
    }, 1500);
}

function copyById(id, button){
    const textarea = document.getElementById(id);

    textarea.select();
    textarea.setSelectionRange(0, 99999);

    navigator.clipboard.writeText(textarea.value);

    const original = button.innerText;
    button.innerText = "Berhasil Disalin ✓";

    setTimeout(() => {
        button.innerText = original;
    }, 1500);
}
</script>

</body>
</html>
