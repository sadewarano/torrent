<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>P2P Chat Tanpa Server</title>
<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}
textarea{
width:100%;
height:80px;
margin-top:5px;
}
#chat{
height:200px;
}
button{
margin-top:5px;
padding:8px 12px;
}
</style>
</head>
<body>

<h2>P2P Chat Tanpa Server</h2>

<b>Status:</b> <span id="status">Disconnected</span>

<h3>Step 1 (User A)</h3>
<button onclick="createOffer()">Create Offer</button>
<textarea id="offer"></textarea>

<h3>Step 2 (User B)</h3>
Paste Offer:
<textarea id="remoteOffer"></textarea>
<button onclick="createAnswer()">Create Answer</button>

Answer:
<textarea id="answer"></textarea>

<h3>Step 3 (User A)</h3>
Paste Answer:
<textarea id="remoteAnswer"></textarea>
<button onclick="addAnswer()">Connect</button>

<h3>Chat</h3>
<textarea id="chat" readonly></textarea><br>
<input id="msg" placeholder="Ketik pesan..." style="width:80%">
<button onclick="sendMsg()">Send</button>

<script>

let pc = new RTCPeerConnection({
iceServers:[
{urls:"stun:stun.l.google.com:19302"}
]
});

let channel;

function createOffer(){

channel = pc.createDataChannel("chat");

setupChannel();

pc.createOffer().then(o=>{
pc.setLocalDescription(o);
});

pc.onicecandidate=e=>{
if(!e.candidate){
document.getElementById("offer").value=
JSON.stringify(pc.localDescription);
}
};

}

function createAnswer(){

let offer=JSON.parse(
document.getElementById("remoteOffer").value
);

pc.setRemoteDescription(offer);

pc.ondatachannel=e=>{
channel=e.channel;
setupChannel();
};

pc.createAnswer().then(a=>{
pc.setLocalDescription(a);
});

pc.onicecandidate=e=>{
if(!e.candidate){
document.getElementById("answer").value=
JSON.stringify(pc.localDescription);
}
};

}

function addAnswer(){

let answer=JSON.parse(
document.getElementById("remoteAnswer").value
);

pc.setRemoteDescription(answer);

}

function setupChannel(){

channel.onopen=()=>{
document.getElementById("status").innerText="Connected";
};

channel.onmessage=e=>{
let chat=document.getElementById("chat");
chat.value+="Peer: "+e.data+"\n";
chat.scrollTop=chat.scrollHeight;
};

}

function sendMsg(){

let input=document.getElementById("msg");
let msg=input.value;

channel.send(msg);

let chat=document.getElementById("chat");
chat.value+="Me: "+msg+"\n";

input.value="";
chat.scrollTop=chat.scrollHeight;

}

</script>

</body>
</html>
