<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>P2P Chat WebRTC</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:15px;
}

h2{
text-align:center;
}

textarea{
width:100%;
height:80px;
margin-top:5px;
border-radius:8px;
padding:8px;
}

#chat{
height:200px;
}

button{
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
background:#2196F3;
color:white;
font-size:14px;
}

button:active{
opacity:0.7;
}

.row{
display:flex;
gap:5px;
}

.row button{
flex:1;
}

.status{
background:white;
padding:8px;
border-radius:8px;
margin-bottom:10px;
text-align:center;
}

input{
width:70%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.send{
width:28%;
}
</style>
</head>

<body>

<h2>P2P Chat</h2>

<div class="status">
Status: <b id="status">Disconnected</b>
</div>

<h3>Step 1 (User A)</h3>

<button onclick="createOffer()">Create Offer</button>

<textarea id="offer"></textarea>

<div class="row">
<button onclick="copyText('offer')">Copy</button>
<button onclick="pasteText('offer')">Paste</button>
</div>

<h3>Step 2 (User B)</h3>

<textarea id="remoteOffer" placeholder="Paste Offer"></textarea>

<div class="row">
<button onclick="pasteText('remoteOffer')">Paste</button>
</div>

<button onclick="createAnswer()">Create Answer</button>

<textarea id="answer"></textarea>

<div class="row">
<button onclick="copyText('answer')">Copy</button>
<button onclick="pasteText('answer')">Paste</button>
</div>

<h3>Step 3 (User A)</h3>

<textarea id="remoteAnswer" placeholder="Paste Answer"></textarea>

<div class="row">
<button onclick="pasteText('remoteAnswer')">Paste</button>
</div>

<button onclick="addAnswer()">Connect</button>

<h3>Chat</h3>

<textarea id="chat" readonly></textarea>

<br><br>

<input id="msg" placeholder="Ketik pesan...">
<button class="send" onclick="sendMsg()">Send</button>

<script>

let pc=new RTCPeerConnection({
iceServers:[
{urls:"stun:stun.l.google.com:19302"}
]
});

let channel;

function createOffer(){

channel=pc.createDataChannel("chat");

setupChannel();

pc.createOffer().then(o=>{
pc.setLocalDescription(o);
});

pc.onicecandidate=e=>{
if(!e.candidate){
offer.value=JSON.stringify(pc.localDescription);
}
};

}

function createAnswer(){

let offerData=JSON.parse(remoteOffer.value);

pc.setRemoteDescription(offerData);

pc.ondatachannel=e=>{
channel=e.channel;
setupChannel();
};

pc.createAnswer().then(a=>{
pc.setLocalDescription(a);
});

pc.onicecandidate=e=>{
if(!e.candidate){
answer.value=JSON.stringify(pc.localDescription);
}
};

}

function addAnswer(){

let ans=JSON.parse(remoteAnswer.value);

pc.setRemoteDescription(ans);

}

function setupChannel(){

channel.onopen=()=>{
status.innerText="Connected";
};

channel.onmessage=e=>{
chat.value+="Peer: "+e.data+"\n";
chat.scrollTop=chat.scrollHeight;
};

}

function sendMsg(){

let text=msg.value;

if(text==="")return;

channel.send(text);

chat.value+="Me: "+text+"\n";

msg.value="";

chat.scrollTop=chat.scrollHeight;

}

function copyText(id){

let text=document.getElementById(id);

text.select();

document.execCommand("copy");

alert("Copied");

}

async function pasteText(id){

try{

let text=await navigator.clipboard.readText();

document.getElementById(id).value=text;

}catch{

alert("Paste tidak diizinkan browser");

}

}

</script>

</body>
</html>
